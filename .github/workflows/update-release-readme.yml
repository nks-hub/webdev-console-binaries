name: Update Release Table in README

on:
  workflow_dispatch:
  release:
    types: [published, edited, released, prereleased, unpublished, deleted]
  schedule:
    - cron: '23 3 * * *'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Regenerate release catalog section
        run: python3 .github/scripts/update_release_table.py README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit README changes
        run: |
          if git diff --quiet -- README.md; then
            echo "README release table is up-to-date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): refresh release catalog table"
          git push
