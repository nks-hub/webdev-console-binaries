name: Update Release Table in README

on:
  workflow_dispatch:
  release:
    types: [published, edited, released, prereleased, unpublished, deleted]
  schedule:
    - cron: '23 3 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Regenerate release catalog section
        run: python3 .github/scripts/update_release_table.py README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit README changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- README.md; then
            echo "README release table is up-to-date."
            exit 0
          fi
          branch="automation/update-release-readme"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add README.md
          git commit -m "docs(readme): refresh release catalog table"
          git push --force-with-lease origin "HEAD:$branch"
          if gh pr view "$branch" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$branch" \
              --repo "$GITHUB_REPOSITORY" \
              --title "docs(readme): refresh release catalog table" \
              --body "Automated README release table refresh."
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$branch" \
              --title "docs(readme): refresh release catalog table" \
              --body "Automated README release table refresh."
          fi
