name: Build MariaDB Binaries

# MariaDB cross-platform binary distribution.
#   Windows + Linux + macOS: mirror upstream mariadb.org's prebuilt tarballs.
#   Building MariaDB from source on a CI runner takes 30+ min and consumes
#   tons of CPU; mariadb.org publishes per-platform binaries with the right
#   compile flags already.
#
# Trigger:
#   git tag binaries-mariadb-11.4.4 && git push origin binaries-mariadb-11.4.4

on:
  push:
    tags:
      - 'binaries-mariadb-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'MariaDB version, e.g. 11.4.4'
        required: true
        type: string

concurrency:
  # Serialize runs targeting the same release tag so -r2/-r3 retry
  # pushes don't race softprops/action-gh-release uploads. Different
  # versions build in parallel. cancel-in-progress=false keeps a
  # long-running build from being killed by a metadata re-tag.
  group: ${{ github.workflow }}-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME#binaries-mariadb-}"
            VERSION="${RAW%-r*}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download upstream binaries
        id: download
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          BASE="https://archive.mariadb.org/mariadb-${VER}/bintar"

          # Track assets that were downloaded AND verified. Only these get
          # enumerated to the upload step; fail_on_unmatched_files:true guards
          # against any declared-but-missing file (build bug), while an
          # optional target that upstream silently dropped (e.g. archive.mariadb.org
          # not publishing bintar-osx_arm64 for some versions) is logged as a
          # ::warning:: and simply omitted from the release — matching the
          # existing tolerant matrix contract.
          ASSETS=()

          # ── Supply-chain verification helper: MariaDB publishes a
          # sha256sums.txt per directory (format: "<hash>  ./<filename>").
          # Fetch the manifest, grep the filename, compare with local hash.
          # Abort the build on mismatch or missing entry — don't ship an
          # unverified upstream artifact.
          # TODO(SECURITY.md roadmap): additionally verify the accompanying
          # sha256sums.txt.asc GPG signature once the MariaDB signing key
          # is bootstrapped into CI.
          verify_sha256() {
            local file="$1" sums_url="$2" name="$3"
            curl -fsSL "$sums_url" -o mdb-sha256sums.txt
            local expected
            expected=$(awk -v f="./${name}" '$2 == f {print tolower($1); exit}' mdb-sha256sums.txt)
            if [ -z "$expected" ]; then
              echo "::error::$name not found in $sums_url" >&2
              return 1
            fi
            local actual
            actual=$(sha256sum "$file" | awk '{print $1}')
            if [ "$expected" != "$actual" ]; then
              echo "::error::SHA256 mismatch for $name — expected $expected, got $actual" >&2
              return 1
            fi
            echo "✓ SHA256 verified ($name): $actual"
          }

          # mariadb.org publishes Linux glibc and macOS arm64; Windows is shipped
          # as a zero-install ZIP at https://archive.mariadb.org/mariadb-${VER}/winx64-packages/
          LINUX_DIR=""
          LINUX_NAME=""
          # Log which bintar variant actually won the fallback chain so the
          # shipped artifact's systemd-vs-plain provenance is auditable from
          # the workflow run log (MEDIUM-C3 fix). The systemd-bintar has a
          # hard dependency on host systemd; the plain-bintar works on musl /
          # non-systemd hosts. Knowing which one shipped matters when a user
          # reports "fails to start" on Alpine / distroless.
          if curl -fsSL -o "mariadb-${VER}-linux-x64.tar.gz" \
               "${BASE}-linux-systemd-x86_64/mariadb-${VER}-linux-systemd-x86_64.tar.gz"; then
            LINUX_DIR="${BASE}-linux-systemd-x86_64"
            LINUX_NAME="mariadb-${VER}-linux-systemd-x86_64.tar.gz"
            echo "::notice::mariadb ${VER} linux source: systemd-bintar (${LINUX_DIR})"
          elif curl -fsSL -o "mariadb-${VER}-linux-x64.tar.gz" \
                 "${BASE}-linux-x86_64/mariadb-${VER}-linux-x86_64.tar.gz"; then
            LINUX_DIR="${BASE}-linux-x86_64"
            LINUX_NAME="mariadb-${VER}-linux-x86_64.tar.gz"
            echo "::notice::mariadb ${VER} linux source: plain-bintar (systemd fallback — ${LINUX_DIR})"
          fi
          if [ -n "$LINUX_NAME" ]; then
            verify_sha256 "mariadb-${VER}-linux-x64.tar.gz" "${LINUX_DIR}/sha256sums.txt" "$LINUX_NAME"
            ASSETS+=("mariadb-${VER}-linux-x64.tar.gz")
          else
            echo "::error::MariaDB ${VER} linux-x64 not published by upstream (neither systemd nor plain bintar)" >&2
            exit 1
          fi

          # macOS arm64 (not published for every version — tolerate absence)
          if curl -fsSL -o "mariadb-${VER}-macos-arm64.tar.gz" \
               "https://archive.mariadb.org/mariadb-${VER}/bintar-osx_arm64/mariadb-${VER}-osx_arm64.tar.gz"; then
            verify_sha256 "mariadb-${VER}-macos-arm64.tar.gz" \
              "https://archive.mariadb.org/mariadb-${VER}/bintar-osx_arm64/sha256sums.txt" \
              "mariadb-${VER}-osx_arm64.tar.gz"
            ASSETS+=("mariadb-${VER}-macos-arm64.tar.gz")
          else
            echo "::warning::MariaDB ${VER} macOS-arm64 not published by upstream, shipping without it"
            rm -f "mariadb-${VER}-macos-arm64.tar.gz"
          fi

          # Windows x64 ZIP (matches wdc-catalog format + daemon BinaryDownloader's
          # zip extraction path; the MSI upstream publishes is not consumable by
          # the daemon and the catalog points at archive.mariadb.org directly).
          # Not published for every version — tolerate absence.
          if curl -fsSL -o "mariadb-${VER}-windows-x64.zip" \
               "https://archive.mariadb.org/mariadb-${VER}/winx64-packages/mariadb-${VER}-winx64.zip"; then
            verify_sha256 "mariadb-${VER}-windows-x64.zip" \
              "https://archive.mariadb.org/mariadb-${VER}/winx64-packages/sha256sums.txt" \
              "mariadb-${VER}-winx64.zip"
            ASSETS+=("mariadb-${VER}-windows-x64.zip")
          else
            echo "::warning::MariaDB ${VER} windows-x64 ZIP not published by upstream, shipping without it"
            rm -f "mariadb-${VER}-windows-x64.zip"
          fi

          ls -lh mariadb-${VER}-* 2>/dev/null || echo "No artifacts downloaded"

          # Emit newline-separated file list for the upload step. Using the
          # multiline heredoc form so softprops/action-gh-release receives the
          # same format its `files:` input expects (one path per line).
          {
            echo "files<<__ASSETS_EOF__"
            for a in "${ASSETS[@]}"; do echo "$a"; done
            echo "__ASSETS_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: binaries-mariadb-${{ steps.ver.outputs.version }}
          name: MariaDB ${{ steps.ver.outputs.version }} (cross-platform binaries)
          body: |
            Mirror of [MariaDB ${{ steps.ver.outputs.version }}](https://mariadb.org/download/?t=mariadb&p=mariadb&r=${{ steps.ver.outputs.version }}) for use with NKS WebDev Console's `wdc binaries install mariadb@${{ steps.ver.outputs.version }}` flow.

            **Linux/macOS**: after extracting the archive, run `chmod +x bin/*` —
            GitHub release tarballs preserve mode bits, but if the archive was
            repackaged or assets re-uploaded, Unix mode bits may be lost
            (0755 → 0644). The daemon's downloader handles this automatically;
            manual extraction may need the chmod.
          fail_on_unmatched_files: true
          files: ${{ steps.download.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # macOS arm64: MariaDB upstream stopped publishing bintar-osx_arm64
  # tarballs (archive.mariadb.org 404 for 11.4.x→12.3.x). Apple Silicon
  # users of WDC had no installable DB. This job builds MariaDB from
  # source on the official GitHub macos-14 (M1) runner so we can ship
  # a macos-arm64 tarball alongside the mirrored Linux + Windows assets.
  # Runs independently of `mirror` — if mirror fails the macOS build can
  # still deliver value to Apple Silicon users.
  build-macos-arm64:
    runs-on: macos-14
    needs: mirror
    timeout-minutes: 90
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME#binaries-mariadb-}"
            VERSION="${RAW%-r*}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Skip if macOS asset already shipped
        id: existing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.ver.outputs.version }}"
          if gh release view "binaries-mariadb-${VER}" --json assets --jq '.assets[].name' 2>/dev/null | grep -q "mariadb-${VER}-macos-arm64.tar.gz"; then
            echo "already=true" >> $GITHUB_OUTPUT
            echo "::notice::macOS arm64 asset already present on release, skipping source build"
          else
            echo "already=false" >> $GITHUB_OUTPUT
          fi

      - name: Install build deps
        if: steps.existing.outputs.already != 'true'
        run: |
          brew update > /dev/null
          brew install cmake boost openssl@3 pcre2 ncurses libgcrypt jemalloc

      - name: Download + extract source
        if: steps.existing.outputs.already != 'true'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          curl -fsSL -o "mariadb-${VER}.tar.gz" \
            "https://archive.mariadb.org/mariadb-${VER}/source/mariadb-${VER}.tar.gz"
          tar xzf "mariadb-${VER}.tar.gz"
          mv "mariadb-${VER}" src

      - name: Configure (cmake)
        if: steps.existing.outputs.already != 'true'
        shell: bash
        run: |
          # -p so a re-run doesn't trip bash -e when the dir already
          # exists from a partial previous step on the same runner.
          mkdir -p src/build
          OPENSSL_ROOT="$(brew --prefix openssl@3)"
          PCRE_ROOT="$(brew --prefix pcre2)"
          # Explicit -S/-B so cmake never guesses paths from pwd —
          # fixes the "source directory does not appear to contain
          # CMakeLists.txt" error we hit when multiline `cd` chains
          # didn't propagate between run blocks.
          cmake -S src -B src/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/out" \
            -DWITH_SSL=system \
            -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
            -DWITH_PCRE=system \
            -DPCRE2_ROOT="${PCRE_ROOT}" \
            -DWITHOUT_TOKUDB=1 \
            -DWITHOUT_MROONGA=1 \
            -DWITHOUT_SERVER=0 \
            -DINSTALL_MYSQLTESTDIR= \
            -DINSTALL_SQLBENCHDIR=

      - name: Build
        if: steps.existing.outputs.already != 'true'
        run: |
          cmake --build src/build --parallel $(sysctl -n hw.ncpu)

      - name: Install + package
        if: steps.existing.outputs.already != 'true'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          cmake --install src/build
          tar czf "mariadb-${VER}-macos-arm64.tar.gz" -C out .
          ls -lh "mariadb-${VER}-macos-arm64.tar.gz"

      - name: Upload to release
        if: steps.existing.outputs.already != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: binaries-mariadb-${{ steps.ver.outputs.version }}
          files: mariadb-${{ steps.ver.outputs.version }}-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
