name: Build MariaDB Binaries

# MariaDB cross-platform binary distribution.
#   Windows + Linux + macOS: mirror upstream mariadb.org's prebuilt tarballs.
#   Building MariaDB from source on a CI runner takes 30+ min and consumes
#   tons of CPU; mariadb.org publishes per-platform binaries with the right
#   compile flags already.
#
# Trigger:
#   git tag binaries-mariadb-11.4.4 && git push origin binaries-mariadb-11.4.4

on:
  push:
    tags:
      - 'binaries-mariadb-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'MariaDB version, e.g. 11.4.4'
        required: true
        type: string

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME#binaries-mariadb-}"
            VERSION="${RAW%-r*}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download upstream binaries
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          BASE="https://archive.mariadb.org/mariadb-${VER}/bintar"

          # ── Supply-chain verification helper: MariaDB publishes a
          # sha256sums.txt per directory (format: "<hash>  ./<filename>").
          # Fetch the manifest, grep the filename, compare with local hash.
          # Abort the build on mismatch or missing entry — don't ship an
          # unverified upstream artifact.
          # TODO(SECURITY.md roadmap): additionally verify the accompanying
          # sha256sums.txt.asc GPG signature once the MariaDB signing key
          # is bootstrapped into CI.
          verify_sha256() {
            local file="$1" sums_url="$2" name="$3"
            curl -fsSL "$sums_url" -o mdb-sha256sums.txt
            local expected
            expected=$(awk -v f="./${name}" '$2 == f {print tolower($1); exit}' mdb-sha256sums.txt)
            if [ -z "$expected" ]; then
              echo "::error::$name not found in $sums_url" >&2
              return 1
            fi
            local actual
            actual=$(sha256sum "$file" | awk '{print $1}')
            if [ "$expected" != "$actual" ]; then
              echo "::error::SHA256 mismatch for $name — expected $expected, got $actual" >&2
              return 1
            fi
            echo "✓ SHA256 verified ($name): $actual"
          }

          # mariadb.org publishes Linux glibc and macOS arm64; Windows is MSI
          # at https://archive.mariadb.org/mariadb-${VER}/winx64-packages/
          LINUX_DIR=""
          LINUX_NAME=""
          if curl -fsSL -o "mariadb-${VER}-linux-x64.tar.gz" \
               "${BASE}-linux-systemd-x86_64/mariadb-${VER}-linux-systemd-x86_64.tar.gz"; then
            LINUX_DIR="${BASE}-linux-systemd-x86_64"
            LINUX_NAME="mariadb-${VER}-linux-systemd-x86_64.tar.gz"
          elif curl -fsSL -o "mariadb-${VER}-linux-x64.tar.gz" \
                 "${BASE}-linux-x86_64/mariadb-${VER}-linux-x86_64.tar.gz"; then
            LINUX_DIR="${BASE}-linux-x86_64"
            LINUX_NAME="mariadb-${VER}-linux-x86_64.tar.gz"
          fi
          if [ -n "$LINUX_NAME" ]; then
            verify_sha256 "mariadb-${VER}-linux-x64.tar.gz" "${LINUX_DIR}/sha256sums.txt" "$LINUX_NAME"
          fi

          # macOS arm64 (not published for every version — skip verify if absent)
          if curl -fsSL -o "mariadb-${VER}-macos-arm64.tar.gz" \
               "https://archive.mariadb.org/mariadb-${VER}/bintar-osx_arm64/mariadb-${VER}-osx_arm64.tar.gz"; then
            verify_sha256 "mariadb-${VER}-macos-arm64.tar.gz" \
              "https://archive.mariadb.org/mariadb-${VER}/bintar-osx_arm64/sha256sums.txt" \
              "mariadb-${VER}-osx_arm64.tar.gz"
          fi

          # Windows x64 MSI
          if curl -fsSL -o "mariadb-${VER}-windows-x64.msi" \
               "https://archive.mariadb.org/mariadb-${VER}/winx64-packages/mariadb-${VER}-winx64.msi"; then
            verify_sha256 "mariadb-${VER}-windows-x64.msi" \
              "https://archive.mariadb.org/mariadb-${VER}/winx64-packages/sha256sums.txt" \
              "mariadb-${VER}-winx64.msi"
          fi

          ls -lh mariadb-${VER}-* 2>/dev/null || echo "No artifacts downloaded"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: binaries-mariadb-${{ steps.ver.outputs.version }}
          name: MariaDB ${{ steps.ver.outputs.version }} (cross-platform binaries)
          body: |
            Mirror of [MariaDB ${{ steps.ver.outputs.version }}](https://mariadb.org/download/?t=mariadb&p=mariadb&r=${{ steps.ver.outputs.version }}) for use with NKS WebDev Console's `wdc binaries install mariadb@${{ steps.ver.outputs.version }}` flow.
          fail_on_unmatched_files: false
          files: |
            mariadb-${{ steps.ver.outputs.version }}-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
