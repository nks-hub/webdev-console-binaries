name: Build Redis Binaries

# Redis cross-platform binary builder.
#   Linux + macOS: build from source. Both targets `make` from upstream tarball.
#   Windows: mirror the Microsoft-archived port from
#     https://github.com/microsoftarchive/redis (or memurai/redis-windows).
#     Upstream Redis Labs dropped Windows; the community fork lives on GitHub.
#
# Trigger:
#   git tag binaries-redis-7.4.2 && git push origin binaries-redis-7.4.2

on:
  push:
    tags:
      - 'binaries-redis-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Redis version, e.g. 7.4.2'
        required: true
        type: string

concurrency:
  # Serialize runs targeting the same release tag so -r2/-r3 retry
  # pushes don't race softprops/action-gh-release uploads. Different
  # versions build in parallel. cancel-in-progress=false keeps a
  # long-running build from being killed by a metadata re-tag.
  group: ${{ github.workflow }}-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
            ext: tar.xz
          - os: macos-14
            target: macos-arm64
            ext: tar.xz
          - os: ubuntu-24.04
            target: windows-x64
            ext: zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME#binaries-redis-}"
            VERSION="${RAW%-r*}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ── Windows: mirror redis-windows community fork ──
      - name: Windows — download redis-windows fork
        if: matrix.target == 'windows-x64'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          # tporadowski/redis is the most-active maintained Windows fork (as of 2026)
          # tags use Redis-X.Y.Z naming.
          # Log which fork URL won the fallback chain so the shipped
          # Windows zip's provenance is auditable from the workflow run log
          # (MEDIUM-G1 fix). tporadowski/redis last tagged v5.0.14.1 (2022)
          # so modern Redis (7.x+) falls through to redis-windows/redis-windows.
          # Without this notice there is no evidence trail telling us which
          # fork built the uploaded zip.
          PICKED_URL=""
          for URL in \
            "https://github.com/tporadowski/redis/releases/download/v${VER}/Redis-x64-${VER}.zip" \
            "https://github.com/redis-windows/redis-windows/releases/download/${VER}/Redis-${VER}-Windows-x64-msys2-with-Service.zip"; do
            if curl -fsIL "$URL" >/dev/null 2>&1; then
              curl -fsSL -o "redis-${VER}-windows-x64.zip" "$URL"
              PICKED_URL="$URL"
              break
            fi
          done
          case "$PICKED_URL" in
            *tporadowski/redis*)
              echo "::notice::redis ${VER} windows source: tporadowski/redis (${PICKED_URL})"
              ;;
            *redis-windows/redis-windows*)
              echo "::notice::redis ${VER} windows source: redis-windows/redis-windows (tporadowski fallback — ${PICKED_URL})"
              ;;
            "")
              echo "::error::redis ${VER} windows: no fork URL reachable" >&2
              exit 1
              ;;
          esac
          # ── Supply-chain verification: TODO(SECURITY.md roadmap)
          # Neither tporadowski/redis nor redis-windows/redis-windows ship
          # SHA256 sidecars or GPG .asc signatures alongside their release
          # assets (verified 2026-04 via GitHub releases API — assets list
          # contains only the .zip / .msi, no companion manifest). Mirroring
          # a community Windows fork is inherently higher-trust than a
          # first-party release; switching to a signed upstream (if Redis
          # ever republishes an official Windows build) or pinning the
          # git-tag commit SHA of the fork are both tracked in SECURITY.md.
          ls -lh "redis-${VER}-windows-x64.zip"

      # ── Linux + macOS: build from source ──
      - name: Linux — install build deps
        if: matrix.target == 'linux-x64'
        run: sudo apt-get update -q && sudo apt-get install -y -q build-essential pkg-config

      - name: macOS — install build deps
        if: matrix.target == 'macos-arm64'
        run: brew install --formula openssl@3 pkg-config

      - name: Build Redis from source
        if: matrix.target != 'windows-x64'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          curl -fsSL -o redis-src.tar.gz "https://download.redis.io/releases/redis-${VER}.tar.gz"
          # ── Supply-chain verification: TODO(SECURITY.md roadmap)
          # download.redis.io publishes neither a SHA sidecar nor a detached
          # PGP signature next to source tarballs (verified 2026-04 —
          # .sha256, .sha512, .asc all return 404). The GitHub release at
          # github.com/redis/redis/releases/tags/${VER} also has zero
          # assets — only the auto-generated source archive, which differs
          # byte-for-byte from the download.redis.io tarball (the latter
          # includes pre-built COMMIT/version files). Until Redis starts
          # publishing verifiable hashes, upstream integrity relies solely
          # on TLS to download.redis.io.
          tar xf redis-src.tar.gz
          cd redis-${VER}
          PREFIX="${{ github.workspace }}/install/redis-${VER}"
          # Build deps explicitly first so hiredis_ssl.a is built when BUILD_TLS=yes.
          # Without this, the top-level make tries to link libhiredis_ssl.a before
          # the deps subdir's BUILD_TLS=yes has been honored.
          if [ "${{ matrix.target }}" = "macos-arm64" ]; then
            export OPENSSL_PREFIX="$(brew --prefix openssl@3)"
            make -C deps hiredis BUILD_TLS=yes OPENSSL_PREFIX="$OPENSSL_PREFIX" -j$(sysctl -n hw.ncpu)
            make BUILD_TLS=yes OPENSSL_PREFIX="$OPENSSL_PREFIX" -j$(sysctl -n hw.ncpu)
          else
            make -C deps hiredis BUILD_TLS=yes -j$(nproc)
            make BUILD_TLS=yes -j$(nproc)
          fi
          make PREFIX="$PREFIX" install
          ls "$PREFIX/bin/" | head -10

      - name: Package — Linux/macOS tar.xz
        if: matrix.target != 'windows-x64'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          cd "${{ github.workspace }}/install/redis-${VER}"
          tar -cJf "${{ github.workspace }}/redis-${VER}-${{ matrix.target }}.tar.xz" bin
          ls -lh "${{ github.workspace }}/redis-${VER}-${{ matrix.target }}.tar.xz"

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: binaries-redis-${{ steps.ver.outputs.version }}
          name: Redis ${{ steps.ver.outputs.version }} (cross-platform binaries)
          body: |
            Self-contained Redis ${{ steps.ver.outputs.version }} binaries for use with NKS WebDev Console's `wdc binaries install redis@${{ steps.ver.outputs.version }}` flow. Linux/macOS built from upstream `download.redis.io` source with `BUILD_TLS=yes`. Windows is a mirror of the [tporadowski/redis](https://github.com/tporadowski/redis) community fork.
          fail_on_unmatched_files: true
          files: redis-${{ steps.ver.outputs.version }}-${{ matrix.target }}.${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
