name: Build MySQL Binaries

# MySQL cross-platform binary distribution.
#   Windows: mirror upstream dev.mysql.com community zips (pre-built).
#   Linux:   mirror upstream dev.mysql.com linux-glibc2.x tarballs.
#   macOS:   Oracle does not publish arm64 zips — build from source on
#            a macos-14 (Apple Silicon) runner.
#
# Trigger:
#   git tag binaries-mysql-8.4.8 && git push origin binaries-mysql-8.4.8
#   (or workflow_dispatch with input `version`)

on:
  push:
    tags:
      - 'binaries-mysql-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'MySQL version, e.g. 8.4.8 or 9.6.0'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Mirror Windows + Linux community zips from dev.mysql.com. These are
  # pre-built by Oracle and signed; we just rehost them on a GitHub
  # release so NKS WDC's catalog (wdc.nks-hub.cz) has a stable asset URL.
  mirror:
    runs-on: ubuntu-24.04
    outputs:
      majorminor: ${{ steps.ver.outputs.majorminor }}
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME#binaries-mysql-}"
            VERSION="${RAW%-r*}"
          fi
          MAJORMINOR="$(echo "$VERSION" | cut -d. -f1,2)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "majorminor=$MAJORMINOR" >> $GITHUB_OUTPUT

      - name: Download upstream binaries
        id: download
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          MM="${{ steps.ver.outputs.majorminor }}"
          ASSETS=()

          # Windows x64 community zip (official, always available).
          WIN_URL="https://dev.mysql.com/get/Downloads/MySQL-${MM}/mysql-${VER}-winx64.zip"
          if curl -fsSL -o "mysql-${VER}-windows-x64.zip" "$WIN_URL"; then
            ASSETS+=("mysql-${VER}-windows-x64.zip")
          else
            echo "::warning::MySQL ${VER} windows-x64 not published at ${WIN_URL}"
            rm -f "mysql-${VER}-windows-x64.zip"
          fi

          # Linux x64 generic glibc2.28 tarball. Oracle publishes these
          # for recent releases — tolerate 404 for older versions.
          LINUX_URL="https://dev.mysql.com/get/Downloads/MySQL-${MM}/mysql-${VER}-linux-glibc2.28-x86_64.tar.xz"
          if curl -fsSL -o "mysql-${VER}-linux-x64.tar.xz" "$LINUX_URL"; then
            ASSETS+=("mysql-${VER}-linux-x64.tar.xz")
          else
            echo "::warning::MySQL ${VER} linux-x64 not published at ${LINUX_URL}"
            rm -f "mysql-${VER}-linux-x64.tar.xz"
          fi

          ls -lh mysql-${VER}-* 2>/dev/null || echo "No artifacts downloaded"

          {
            echo "files<<__ASSETS_EOF__"
            for a in "${ASSETS[@]}"; do echo "$a"; done
            echo "__ASSETS_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: binaries-mysql-${{ steps.ver.outputs.version }}
          name: MySQL ${{ steps.ver.outputs.version }} (cross-platform binaries)
          body: |
            Mirror of [MySQL ${{ steps.ver.outputs.version }}](https://dev.mysql.com/downloads/mysql/) for use with NKS WebDev Console's `wdc binaries install mysql@${{ steps.ver.outputs.version }}` flow. macOS arm64 asset, if present, is built from source in a separate job (Oracle does not ship arm64 community zips).
          fail_on_unmatched_files: false
          files: ${{ steps.download.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # macOS arm64: Oracle's community download page offers DMGs, not
  # zip/tarballs consumable by the daemon. Build exact tagged sources on
  # macos-15 arm64; macos-14/Xcode 15.4 trips on MySQL 9.x C++20 templates.
  build-macos-arm64:
    runs-on: macos-15
    needs: mirror
    timeout-minutes: 120
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME#binaries-mysql-}"
            VERSION="${RAW%-r*}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Skip if macOS asset already shipped
        id: existing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.ver.outputs.version }}"
          if gh release view "binaries-mysql-${VER}" --json assets --jq '.assets[].name' 2>/dev/null | grep -q "mysql-${VER}-macos-arm64.tar.gz"; then
            echo "already=true" >> $GITHUB_OUTPUT
          else
            echo "already=false" >> $GITHUB_OUTPUT
          fi

      - name: Install build deps
        if: steps.existing.outputs.already != 'true'
        run: |
          test "$(uname -m)" = "arm64"
          sudo xcode-select --switch /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version
          xcrun --show-sdk-path
          brew update > /dev/null
          brew install cmake openssl@3 zstd libfido2 pkg-config bison
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"

      - name: Download + extract source
        if: steps.existing.outputs.already != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          MM="$(echo "$VER" | cut -d. -f1,2)"
          curl -fsSL -o "mysql-${VER}-src.tar.gz" \
            "https://dev.mysql.com/get/Downloads/MySQL-${MM}/mysql-${VER}.tar.gz"
          tar xzf "mysql-${VER}-src.tar.gz"
          mv "mysql-${VER}" src

      - name: Configure (cmake)
        if: steps.existing.outputs.already != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src/bld boost-dl
          OPENSSL_ROOT="$(brew --prefix openssl@3)"
          BISON_EXE="$(brew --prefix bison)/bin/bison"
          XCODE_SYSROOT="$(xcrun --show-sdk-path)"
          export SDKROOT="${XCODE_SYSROOT}"
          export MACOSX_DEPLOYMENT_TARGET="14.0"
          cmake -S src -B src/bld \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/out" \
            -DCMAKE_C_COMPILER="$(xcrun -f clang)" \
            -DCMAKE_CXX_COMPILER="$(xcrun -f clang++)" \
            -DCMAKE_OSX_SYSROOT="${XCODE_SYSROOT}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="14.0" \
            -DWITH_SSL="${OPENSSL_ROOT}" \
            -DBISON_EXECUTABLE="${BISON_EXE}" \
            -DWITH_BOOST="${GITHUB_WORKSPACE}/boost-dl" \
            -DDOWNLOAD_BOOST=1 \
            -DWITH_UNIT_TESTS=OFF \
            -DWITHOUT_SERVER=0 \
            -DINSTALL_MYSQLTESTDIR= \
            -DINSTALL_SQLBENCHDIR=

      - name: Build
        if: steps.existing.outputs.already != 'true'
        run: |
          export SDKROOT="$(xcrun --show-sdk-path)"
          export MACOSX_DEPLOYMENT_TARGET="14.0"
          cmake --build src/bld --parallel "$(sysctl -n hw.ncpu)"

      - name: Install
        if: steps.existing.outputs.already != 'true'
        shell: bash
        run: |
          cmake --install src/bld

      # Bundle keg-only brew dylibs (protobuf, openssl, zstd, lz4, libevent,
      # libfido2, ...) into out/lib so MySQL binaries run on any Apple
      # Silicon Mac without Homebrew. dylibbundler walks LC_LOAD_DYLIB on
      # every Mach-O under bin/ + lib/plugin/, copies each /opt/homebrew
      # dylib into -d <dst>, rewrites references to @rpath/<lib>, and we
      # stamp @loader_path/../lib so binaries find their deps relative to
      # their own location. Without this, users see:
      #   dyld: Library not loaded: /opt/homebrew/opt/protobuf/.../libprotobuf-lite.24.4.0.dylib
      - name: macOS — bundle brew dylibs (dylibbundler)
        if: steps.existing.outputs.already != 'true'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          PREFIX="$GITHUB_WORKSPACE/out"
          brew install --quiet dylibbundler >/dev/null
          mkdir -p "$PREFIX/lib"
          TARGETS=()
          for d in "$PREFIX/bin"; do
            [ -d "$d" ] || continue
            while IFS= read -r f; do
              file "$f" 2>/dev/null | grep -q 'Mach-O' && TARGETS+=("$f")
            done < <(find "$d" -maxdepth 1 -type f)
          done
          # lib/plugin holds dynamic MySQL plugins (keyring, auth, ...).
          for d in "$PREFIX/lib/plugin" "$PREFIX/lib/mysql/plugin"; do
            [ -d "$d" ] || continue
            while IFS= read -r f; do
              case "$f" in *.dylib|*.so)
                file "$f" 2>/dev/null | grep -q 'Mach-O' && TARGETS+=("$f") ;;
              esac
            done < <(find "$d" -maxdepth 1 -type f)
          done
          # MySQL ships several shared libs (libmysqlclient.22.dylib,
          # libmysqlservices, libprotobuf-lite bundled as .dylibs) that
          # link to /opt/homebrew themselves and would trip the leak
          # detector below if we skipped them.
          if [ -d "$PREFIX/lib" ]; then
            while IFS= read -r f; do
              case "$f" in *.dylib)
                file "$f" 2>/dev/null | grep -q 'Mach-O' && TARGETS+=("$f") ;;
              esac
            done < <(find "$PREFIX/lib" -maxdepth 1 -type f)
          fi
          echo "Bundling ${#TARGETS[@]} Mach-O target(s)"
          args=(-b -cd -of -d "$PREFIX/lib" -p "@rpath/")
          for t in "${TARGETS[@]}"; do args+=(-x "$t"); done
          for keg in openssl@3 openssl@1.1 protobuf zstd lz4 libevent icu4c \
                     libfido2 readline ncurses cyrus-sasl abseil zlib boost; do
            p=$(brew --prefix "$keg" 2>/dev/null || true)
            [ -n "$p" ] && [ -d "$p/lib" ] && args+=(-s "$p/lib")
          done
          dylibbundler "${args[@]}" || echo "::warning::dylibbundler returned non-zero; will verify"
          # After dylibbundler: re-enumerate $PREFIX/lib/*.dylib because the
          # bundler COPIED fresh dylibs into it whose own LC_LOAD_DYLIB
          # references still point at /opt/homebrew (bundler only rewrites
          # the targets you pass via -x, not their transitive dylib copies).
          # Stamp @loader_path on everything now + re-run dylibbundler on
          # each to chase the dependency graph down.
          # macOS ships bash 3.2 where `mapfile` doesn't exist — use a
          # plain for-loop with globbing to collect bundled libs. -nullglob
          # keeps the loop silent when lib/ ends up empty.
          shopt -s nullglob
          BUNDLED=("$PREFIX"/lib/*.dylib "$PREFIX"/lib/*.so)
          shopt -u nullglob
          # Fix transitive deps inside bundled libs (they reference each
          # other via @rpath too, so each bundled lib needs its own rpath).
          for bl in "${BUNDLED[@]}"; do
            install_name_tool -add_rpath "@loader_path/." "$bl" 2>/dev/null || true
            # Rewrite any residual /opt/homebrew LC_LOAD_DYLIB to @rpath form
            otool -L "$bl" 2>/dev/null | awk '/\/opt\/homebrew/ {print $1}' | while read dep; do
              name=$(basename "$dep")
              install_name_tool -change "$dep" "@rpath/$name" "$bl" 2>/dev/null || true
            done
            codesign --force -s - "$bl" 2>/dev/null || true
          done
          for t in "${TARGETS[@]}"; do
            install_name_tool -add_rpath "@loader_path/../lib" "$t" 2>/dev/null || true
            codesign --force -s - "$t" 2>/dev/null || true
          done
          leaked=""
          for t in "${TARGETS[@]}" "$PREFIX"/lib/*.dylib; do
            [ -f "$t" ] || continue
            if otool -L "$t" 2>/dev/null | grep -qE '/opt/homebrew|/usr/local/opt'; then
              leaked+=$'\n'"  $t"
            fi
          done
          if [ -n "$leaked" ]; then
            echo "::error::brew dylib refs leaked:$leaked"
            exit 1
          fi
          echo "✓ MySQL dependency graph is self-contained"

      - name: Smoke test mysqld --version
        if: steps.existing.outputs.already != 'true'
        shell: bash
        run: |
          "$GITHUB_WORKSPACE/out/bin/mysqld" --version

      - name: Package tarball
        if: steps.existing.outputs.already != 'true'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          tar czf "mysql-${VER}-macos-arm64.tar.gz" -C out .
          ls -lh "mysql-${VER}-macos-arm64.tar.gz"

      - name: Upload to release
        if: steps.existing.outputs.already != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: binaries-mysql-${{ steps.ver.outputs.version }}
          files: mysql-${{ steps.ver.outputs.version }}-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
