name: Build PHP Binaries

# Cross-platform PHP binary builder. Each tag of the form `binaries-php-<ver>`
# triggers a 3-OS matrix that compiles PHP from upstream source for
# Windows, macOS arm64 and Linux x64, packages each as a self-contained
# tarball/zip, and publishes them as release assets. The catalog API then
# points at these URLs so the daemon's `wdc binaries install` works on every
# OS without distro-specific package managers.
#
# Trigger:
#   git tag binaries-php-8.3.25 && git push origin binaries-php-8.3.25
#
# Or via workflow_dispatch with the version as input.

on:
  push:
    tags:
      - 'binaries-php-*'
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version, e.g. 8.3.25'
        required: true
        type: string

concurrency:
  # Serialize runs targeting the same release tag so -r2/-r3 retry
  # pushes don't race softprops/action-gh-release uploads. Different
  # versions build in parallel. cancel-in-progress=false keeps a
  # long-running build from being killed by a metadata re-tag.
  group: ${{ github.workflow }}-${{ github.event.inputs.php_version || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows-x64
            ext: zip
          - os: macos-15
            target: macos-arm64
            ext: tar.xz
          - os: ubuntu-24.04
            target: linux-x64
            ext: tar.xz
    runs-on: ${{ matrix.os }}

    steps:
      # Checkout is needed so legacy-PHP (7.0/7.1) builds can read
      # .github/workflows/assets/icu-config-shim.sh from the bind-mounted
      # /work inside the ubuntu:20.04 docker. Negligible cost (<1 s) on
      # Windows/macOS slots that don't use the shim.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set SOURCE_DATE_EPOCH (reproducibility)
        shell: bash
        run: |
          # Pin mtime + autoconf/GNU-toolchain timestamps to a deterministic
          # epoch so two re-runs of the same tag produce byte-identical
          # archives. Honored by autoconf, libtool, tar (with --mtime).
          TS="${{ github.event.head_commit.timestamp }}"
          if [ -n "$TS" ]; then
            SDE=$(date -d "$TS" +%s 2>/dev/null || python3 -c "import sys,datetime;print(int(datetime.datetime.fromisoformat(sys.argv[1].replace('Z','+00:00')).timestamp()))" "$TS" 2>/dev/null || echo "")
          fi
          [ -z "$SDE" ] && SDE=$(date +%s)
          echo "SOURCE_DATE_EPOCH=$SDE" >> "$GITHUB_ENV"
          echo "SOURCE_DATE_EPOCH=$SDE"

      - name: Resolve PHP version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.php_version }}" ]; then
            VERSION="${{ github.event.inputs.php_version }}"
          else
            # Strip prefix and any -rN retry suffix (e.g. binaries-php-8.3.25-r2 → 8.3.25)
            RAW="${GITHUB_REF_NAME#binaries-php-}"
            VERSION="${RAW%-r*}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_minor=$(echo $VERSION | cut -d. -f1-2)" >> $GITHUB_OUTPUT
          echo "Building PHP $VERSION for ${{ matrix.target }}"

      # ── Windows: just repackage the upstream windows.php.net ZIP ──
      - name: Windows — download & repackage
        if: matrix.target == 'windows-x64'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          MM="${{ steps.ver.outputs.major_minor }}"
          # VS prefix matrix. Filenames on windows.php.net are case-sensitive
          # since the migration to myracloud — always lowercase.
          case "$MM" in
            5.6) VS=vc11 ;;
            7.0|7.1) VS=vc14 ;;
            7.2|7.3|7.4) VS=vc15 ;;
            8.0|8.1|8.2|8.3) VS=vs16 ;;
            8.4|8.5) VS=vs17 ;;
            *) VS=vs17 ;;
          esac
          # Latest minor goes to /releases/, older to /archives/. windows.php.net
          # 302-redirects to downloads.php.net so we MUST use -L on the probe; otherwise
          # the bare /releases/ URL looks fine (302 = curl exit 0) but the redirect
          # target 404s and the actual download crashes mid-pipeline.
          for SUBDIR in "" archives/; do
            URL="https://windows.php.net/downloads/releases/${SUBDIR}php-${VER}-nts-Win32-${VS}-x64.zip"
            if curl -fsIL "$URL" >/dev/null 2>&1; then break; fi
            URL=""
          done
          [ -z "$URL" ] && { echo "No Windows ZIP found for $VER"; exit 1; }
          curl -fsSL -o php-${VER}-windows-x64.zip "$URL"
          # ── Supply-chain verification: windows.php.net publishes a combined
          # sha256sum.txt per directory (releases/ or archives/). Fetch it,
          # grep the filename, compare against local hash. Abort build on
          # mismatch or missing entry — don't ship an unverified upstream ZIP.
          # TODO(SECURITY.md roadmap): additionally verify GPG .asc signature
          # once the PHP release-manager keyring is bootstrapped into CI.
          ZIP_NAME="php-${VER}-nts-Win32-${VS}-x64.zip"
          SUMS_URL="https://windows.php.net/downloads/releases/${SUBDIR}sha256sum.txt"
          curl -fsSL "$SUMS_URL" -o win-sha256sum.txt
          expected=$(awk -v f="$ZIP_NAME" '$2 == "*"f {print $1}' win-sha256sum.txt)
          if [ -z "$expected" ]; then
            echo "::error::$ZIP_NAME not found in $SUMS_URL" >&2
            exit 1
          fi
          actual=$(sha256sum "php-${VER}-windows-x64.zip" | awk '{print $1}')
          if [ "$expected" != "$actual" ]; then
            echo "::error::SHA256 mismatch for $ZIP_NAME — expected $expected, got $actual" >&2
            exit 1
          fi
          echo "✓ SHA256 verified ($ZIP_NAME): $actual"
          ls -lh php-${VER}-windows-x64.zip

      # ── Linux/macOS: build from source ──
      # OpenSSL strategy by PHP minor:
      #   5.6, 7.x, 8.0  → OpenSSL 1.1 (php-src uses RSA_public_decrypt() etc.,
      #                    removed in OpenSSL 3 → won't compile on Ubuntu 24+
      #                    or Homebrew openssl@3). Use docker:ubuntu:20.04 on
      #                    Linux runner and openssl@1.1 on macOS runner.
      #   8.1+           → OpenSSL 3 works fine, use system/openssl@3.
      # 5.x is still too old for a stable Linux CI toolchain in this workflow,
      # but macOS legacy builds are now attempted with trimmed flags.
      - name: Classify PHP version (legacy_ssl, skip_source)
        if: matrix.target != 'windows-x64'
        shell: bash
        run: |
          MM="${{ steps.ver.outputs.major_minor }}"
          TGT="${{ matrix.target }}"
          # Defaults
          SKIP=false; LEGACY=false
          case "$MM" in
            5.*)
              # Keep Linux skipped for PHP 5.x (too old for current container
              # recipe), but try macOS legacy source build.
              LEGACY=true
              if [ "$TGT" = "linux-x64" ]; then
                SKIP=true
                echo "::warning::PHP $MM Linux build skipped (legacy toolchain incompatibility)"
              fi ;;
            7.0)
              # PHP 7.0 still has ICU drift issues on Linux legacy container;
              # keep Linux skipped but allow macOS legacy build path.
              LEGACY=true
              if [ "$TGT" = "linux-x64" ]; then
                SKIP=true
                echo "::warning::PHP $MM Linux build skipped (ICU/toolchain incompatibility)"
              fi ;;
            7.*|8.0)
              # 7.x and 8.0 compile on Linux via docker:ubuntu:20.04 (OpenSSL 1.1.1,
              # libxml2 2.9). macOS has two independent ABI breaks vs legacy PHP:
              #   (a) brew libxml2 2.13+ tightened const-correctness in xmlError*,
              #       breaking ext/libxml compile.
              #   (b) brew icu4c@78 uses C++17/20 features in stringpiece.h
              #       (std::is_same_v<...>) that PHP 7.x/8.0 ext/intl C++
              #       code can't parse.
              # Building both libxml2 2.9 and ICU 66 from source on every CI
              # run costs ~20min extra and doesn't resolve every downstream
              # deprecation. 7.1+ now uses fallback flags on macOS; keep 8.0
              # skipped there until a dedicated patchset exists.
              if [ "$TGT" = "macos-arm64" ] && [ "$MM" = "8.0" ]; then SKIP=true; echo "::warning::PHP $MM macOS skipped (legacy ABI/toolchain drift)"; fi
              LEGACY=true ;;
            *)
              # 8.1+: native build, OpenSSL 3.
              ;;
          esac
          echo "skip_source=$SKIP" >> $GITHUB_ENV
          echo "legacy_ssl=$LEGACY" >> $GITHUB_ENV

      - name: Windows — smoke test php -v
        if: matrix.target == 'windows-x64'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = '${{ steps.ver.outputs.version }}'
          $zip = "php-$ver-windows-x64.zip"
          if (!(Test-Path $zip)) { throw "Missing archive: $zip" }
          $dst = Join-Path $PWD 'php-win-smoke'
          if (Test-Path $dst) { Remove-Item -Recurse -Force $dst }
          Expand-Archive -Path $zip -DestinationPath $dst -Force
          $php = Get-ChildItem -Path $dst -Recurse -Filter php.exe | Select-Object -First 1
          if (-not $php) { throw "php.exe not found in $zip" }
          & $php.FullName -v
          if ($LASTEXITCODE -ne 0) { throw "php -v failed with exit code $LASTEXITCODE" }

      # Linux modern (8.1+): native build on ubuntu-24.04
      - name: Linux — install build deps (modern openssl3)
        if: matrix.target == 'linux-x64' && env.skip_source != 'true' && env.legacy_ssl != 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential autoconf libxml2-dev \
            libsqlite3-dev libssl-dev libcurl4-openssl-dev libonig-dev \
            libzip-dev libbz2-dev libfreetype-dev libjpeg-dev libpng-dev \
            libwebp-dev libxslt-dev libgmp-dev libreadline-dev pkg-config \
            libpq-dev libldap2-dev libargon2-dev libsodium-dev libxpm-dev \
            libavif-dev libtidy-dev libicu-dev

      # Linux legacy (7.x, 8.0): docker container with ubuntu:20.04 → OpenSSL 1.1.1
      - name: Linux — build legacy PHP in docker (ubuntu:20.04, openssl 1.1)
        if: matrix.target == 'linux-x64' && env.legacy_ssl == 'true' && env.skip_source != 'true'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          PREFIX="${{ github.workspace }}/install/php-${VER}"
          mkdir -p "$PREFIX"
          # ── Supply-chain verification: download + verify on the host runner
          # BEFORE entering the minimal docker container (ubuntu:20.04 lacks
          # jq/python3 by default, and we shouldn't install extra tools just
          # for hash lookup). Mount the verified tarball into the container.
          # TODO(SECURITY.md roadmap): additionally verify GPG .asc signature
          # once the PHP release-manager keyring is bootstrapped into CI.
          curl -fsSL "https://www.php.net/distributions/php-${VER}.tar.xz" -o php-src.tar.xz
          curl -fsSL "https://www.php.net/releases/?json&version=${VER}" -o php-release.json
          expected=$(python3 -c "import json,sys; d=json.load(open('php-release.json')); print(next(s['sha256'] for s in d['source'] if s['filename']==f'php-${VER}.tar.xz'))")
          actual=$(sha256sum php-src.tar.xz | awk '{print $1}')
          if [ -z "$expected" ] || [ "$expected" != "$actual" ]; then
            echo "::error::SHA256 mismatch for php-${VER}.tar.xz — expected '$expected', got '$actual'" >&2
            exit 1
          fi
          echo "✓ SHA256 verified (php-${VER}.tar.xz): $actual"
          docker run --rm -v "${{ github.workspace }}:/work" -w /work ubuntu:20.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -q
            apt-get install -y -q build-essential autoconf libxml2-dev libsqlite3-dev \
              libssl-dev libcurl4-openssl-dev libonig-dev libzip-dev libbz2-dev \
              libfreetype-dev libjpeg-dev libpng-dev libwebp-dev libxslt-dev \
              libgmp-dev libreadline-dev pkg-config curl xz-utils ca-certificates \
              libicu-dev libpq-dev libldap2-dev libargon2-dev libsodium-dev \
              libxpm-dev libtidy-dev gettext libc-client-dev libkrb5-dev libmagickwand-dev \
              libmemcached-dev libyaml-dev
            # PHP 7.0/7.1 ext/intl looks for the legacy icu-config script, removed
            # from ICU 60+. Shim is a checked-in file (see HIGH-B1 in nks-ws
            # docs/reviews/2026-04-18-binaries-repo-deep-review.md) so edits
            # don't traverse two layers of shell escaping (outer bash -c \"...\"
            # + inner heredoc). Any dropped backslash before \$ in the prior
            # heredoc would have interpolated the host runner env — including
            # GITHUB_TOKEN — into the guest shim, which writes to /work which
            # is bind-mounted back to the host workspace.
            cp /work/.github/workflows/assets/icu-config-shim.sh /usr/local/bin/icu-config
            chmod +x /usr/local/bin/icu-config
            cat /usr/local/bin/icu-config
            # Use the host-verified tarball mounted from the workspace (sha256
            # already checked against PHP.net /releases/?json manifest).
            cp /work/php-src.tar.xz /tmp/php-src.tar.xz
            cd /tmp && tar xf php-src.tar.xz && cd php-${VER}
            ./configure --prefix=/work/install/php-${VER} \
              --enable-fpm --enable-mbstring --enable-bcmath --enable-soap \
              --enable-intl --enable-pcntl --enable-sockets --enable-exif \
              --with-openssl --with-curl --with-zip --with-zlib --with-bz2 \
              --with-mysqli --with-pdo-mysql --with-pdo-sqlite --with-sqlite3 \
              --with-readline --with-xsl --with-gmp
            make -j\$(nproc) 2>&1 | tail -20
            make install
            ls /work/install/php-${VER}/bin/ /work/install/php-${VER}/sbin/
          "
          # Bundle the OpenSSL 1.1 .so files from the container so the binary runs
          # outside the docker image. `apt-get download` from a sibling container.
          docker run --rm -v "$PREFIX:/dst" ubuntu:20.04 bash -c "
            set -e
            apt-get update -q && apt-get install -y -q libssl1.1
            mkdir -p /dst/lib
            cp -L /usr/lib/x86_64-linux-gnu/libssl.so.1.1 /dst/lib/
            cp -L /usr/lib/x86_64-linux-gnu/libcrypto.so.1.1 /dst/lib/
            # Legacy PHP (7.0-7.3) links against ICU 66 from ubuntu:20.04.
            # Bundle ICU libs so host-side smoke test + end-user runtime don't
            # depend on distro-provided libicu66.
            cp -L /usr/lib/x86_64-linux-gnu/libicu*.so.66 /dst/lib/ || true
          "

      # macOS modern (8.1+): brew openssl@3 + libiconv (for PHP iconv ext)
      - name: macOS — install build deps (modern openssl3)
        if: matrix.target == 'macos-arm64' && env.skip_source != 'true' && env.legacy_ssl != 'true'
        run: |
          # NOTE: 'libwebp' renamed to 'webp', 'libjpeg-turbo' to 'jpeg-turbo'.
          # libiconv is keg-only on macOS but PHP iconv ext requires it via
          # --with-iconv=PREFIX (Apple's libiconv lacks needed symbols).
          # Don't use '|| true' here — first failure aborts brew install and
          # silently leaves later formulae uninstalled, breaking configure.
          brew install --formula autoconf bison openssl@3 libxml2 sqlite zlib \
            libzip libpng jpeg-turbo webp curl freetype gmp icu4c readline \
            oniguruma libsodium argon2 bzip2 libiconv libpq tidy-html5 libxpm \
            openldap gettext

      # macOS legacy (7.x, 8.0): brew openssl@1.1 (deprecated but still installable)
      - name: macOS — install build deps (legacy openssl1.1)
        if: matrix.target == 'macos-arm64' && env.legacy_ssl == 'true' && env.skip_source != 'true'
        run: |
          test "$(uname -m)" = "arm64"
          sudo xcode-select --switch /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version
          xcrun --show-sdk-path
          brew install --formula autoconf bison openssl@1.1 sqlite zlib \
            libzip libpng jpeg-turbo webp curl freetype gmp icu4c readline \
            oniguruma libsodium argon2 bzip2 libiconv libpq tidy-html5 libxpm \
            openldap gettext

      # PHP 7.x/8.0 ext/libxml needs libxml2 2.9 (2.13+ tightened xmlError const).
      # Build it from source into a workspace prefix, then prefer it via
      # PKG_CONFIG_PATH/CPPFLAGS/LDFLAGS during configure. Modern (8.1+) PHP
      # works fine with brew libxml2 2.13+.
      - name: macOS — build libxml2 2.9 from source (legacy PHP only)
        if: matrix.target == 'macos-arm64' && env.legacy_ssl == 'true' && env.skip_source != 'true'
        shell: bash
        run: |
          LIBXML_VER=2.9.14
          PREFIX="${{ github.workspace }}/libxml2-${LIBXML_VER}"
          curl -fsSL -o libxml2.tar.xz "https://download.gnome.org/sources/libxml2/2.9/libxml2-${LIBXML_VER}.tar.xz"
          tar xf libxml2.tar.xz
          cd libxml2-${LIBXML_VER}
          ./configure --prefix="$PREFIX" --without-python --without-lzma
          make -j$(sysctl -n hw.ncpu) 2>&1 | tail -10
          make install
          echo "LIBXML_PREFIX=$PREFIX" >> $GITHUB_ENV
          echo "Built libxml2 ${LIBXML_VER} at $PREFIX"

      - name: Compile PHP from source (Linux modern + macOS)
        if: (matrix.target == 'macos-arm64' || (matrix.target == 'linux-x64' && env.legacy_ssl != 'true')) && env.skip_source != 'true'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          curl -fsSL -o php-src.tar.xz "https://www.php.net/distributions/php-${VER}.tar.xz"
          # ── Supply-chain verification: PHP.net exposes per-release hashes
          # via the JSON API at /releases/?json&version=X.Y.Z (works for both
          # supported releases and museum/archived ones). Extract the expected
          # sha256 for the .tar.xz entry and compare with `sha256sum`.
          # TODO(SECURITY.md roadmap): additionally verify GPG .asc signature
          # once the PHP release-manager keyring is bootstrapped into CI.
          curl -fsSL "https://www.php.net/releases/?json&version=${VER}" -o php-release.json
          expected=$(python3 -c "import json,sys; d=json.load(open('php-release.json')); print(next(s['sha256'] for s in d['source'] if s['filename']==f'php-${VER}.tar.xz'))")
          actual=$(sha256sum php-src.tar.xz | awk '{print $1}')
          if [ -z "$expected" ] || [ "$expected" != "$actual" ]; then
            echo "::error::SHA256 mismatch for php-${VER}.tar.xz — expected '$expected', got '$actual'" >&2
            exit 1
          fi
          echo "✓ SHA256 verified (php-${VER}.tar.xz): $actual"
          tar xf php-src.tar.xz
          cd php-${VER}
          PREFIX="${{ github.workspace }}/install/php-${VER}"
          BZ2_FLAG="--with-bz2"
          CURL_FLAG="--with-curl"
          ZIP_FLAG="--with-zip"
          ZLIB_FLAG="--with-zlib"
          GMP_FLAG="--with-gmp"
          ICONV_FLAG="--with-iconv"
          READLINE_FLAG="--with-readline"
          if [ "${{ matrix.target }}" = "macos-arm64" ]; then
            # Most brew formulae are keg-only on macOS, so PHP configure can't
            # find them via standard search paths. Pass explicit prefixes for
            # every library PHP wires through to lib/include — bzip2, gmp,
            # libiconv, readline are all keg-only.
            BZ2_FLAG="--with-bz2=$(brew --prefix bzip2)"
            GMP_FLAG="--with-gmp=$(brew --prefix gmp)"
            ICONV_FLAG="--with-iconv=$(brew --prefix libiconv)"
            READLINE_FLAG="--with-readline=$(brew --prefix readline)"
            if [ "${{ env.legacy_ssl }}" = "true" ]; then
              SSL_PREFIX="$(brew --prefix openssl@1.1)"
            else
              SSL_PREFIX="$(brew --prefix openssl@3)"
            fi
            ZLIB_PREFIX="$(brew --prefix zlib)"
            CURL_FLAG="--with-curl=$(brew --prefix curl)"
            export PKG_CONFIG_PATH="$SSL_PREFIX/lib/pkgconfig:$(brew --prefix icu4c)/lib/pkgconfig:$(brew --prefix libxml2)/lib/pkgconfig:$(brew --prefix gmp)/lib/pkgconfig:$(brew --prefix libiconv)/lib/pkgconfig:$(brew --prefix readline)/lib/pkgconfig:${ZLIB_PREFIX}/lib/pkgconfig:$PKG_CONFIG_PATH"
            export LDFLAGS="-L$(brew --prefix gmp)/lib -L$(brew --prefix libiconv)/lib -L$(brew --prefix readline)/lib -L${ZLIB_PREFIX}/lib $LDFLAGS"
            export CPPFLAGS="-I$(brew --prefix gmp)/include -I$(brew --prefix libiconv)/include -I$(brew --prefix readline)/include -I${ZLIB_PREFIX}/include $CPPFLAGS"
            if [ "${{ env.legacy_ssl }}" = "true" ]; then
              # Homebrew icu4c now requires C++17 headers. PHP 7.4's intl
              # extension is C++ but its old build system does not request
              # a modern standard by itself.
              export CXXFLAGS="-std=c++17 $CXXFLAGS"
            fi
          fi
          # ── Comprehensive PHP build covering common framework + CMS workloads.
          # SAPIs: cli (default), fpm (php-fpm), cgi (rare but small).
          # Core perf: opcache (JIT in 8+; major perf win), pcntl, sockets, sysv*.
          # Image processing: gd with jpeg/webp/freetype/avif (Drupal/WP/Laravel-Spatie).
          # Database: mysqli/pdo_mysql, pdo_sqlite/sqlite3, pdo_pgsql/pgsql.
          # Net: curl, openssl, soap, ftp, ldap (skip on legacy mac).
          # Text: mbstring, intl, iconv, xsl, tidy.
          # Crypto/math: bcmath, gmp, sodium, hash (default).
          # Containers: zip, bz2, zlib.
          # Default-on but explicit for visibility: opcache flag changed location across versions.
          GD_FLAGS="--enable-gd --with-jpeg --with-webp --with-freetype --with-xpm"
          PG_FLAGS="--with-pgsql --with-pdo-pgsql"
          TIDY_FLAGS="--with-tidy"
          LDAP_FLAGS="--with-ldap"
          GETTEXT_FLAGS="--with-gettext"
          ARGON2_FLAGS="--with-password-argon2"
          SODIUM_FLAGS="--with-sodium"
          INTL_FLAG="--enable-intl"
          PCRE_JIT_FLAG=""
          MM="${{ steps.ver.outputs.major_minor }}"
          # Feature gates by PHP minor:
          # - 5.6/7.0: ext/intl fails with modern icu4c -> disable intl.
          # - <7.2: no argon2/sodium configure switches.
          case "$MM" in
            5.*|7.0|7.1|7.2|7.3)
              INTL_FLAG="--disable-intl"
              if [ "$MM" = "5.*" ] || [ "$MM" = "7.0" ] || [ "$MM" = "7.1" ]; then
                ARGON2_FLAGS=""
                SODIUM_FLAGS=""
              fi
              if [ "$MM" = "7.1" ] || [ "$MM" = "7.2" ] || [ "$MM" = "7.3" ]; then
                PCRE_JIT_FLAG="--without-pcre-jit"
              fi
              ZIP_FLAG="--enable-zip"
              if [ "${{ matrix.target }}" = "macos-arm64" ]; then
                ZLIB_FLAG="--with-zlib-dir=$(brew --prefix zlib)"
              fi
              ;;
          esac
          # macOS legacy: prefer the libxml2 2.9 we built from source by
          # putting it first on pkg-config/include/lib search paths.
          if [ "${{ matrix.target }}" = "macos-arm64" ] && [ "${{ env.legacy_ssl }}" = "true" ] && [ -n "${{ env.LIBXML_PREFIX }}" ]; then
            export PKG_CONFIG_PATH="${{ env.LIBXML_PREFIX }}/lib/pkgconfig:$PKG_CONFIG_PATH"
            export CPPFLAGS="-I${{ env.LIBXML_PREFIX }}/include/libxml2 $CPPFLAGS"
            export LDFLAGS="-L${{ env.LIBXML_PREFIX }}/lib $LDFLAGS"
          fi
          # IMAP was deprecated in 8.4 and dropped in 8.5. Build it for 7.4-8.3
          # so users with legacy mail-handling code keep working. Needs libc-client
          # which is itself deprecated; install via apt/brew where still packaged.
          IMAP_FLAGS=""
          case "$MM" in
            7.*|8.0|8.1|8.2|8.3) IMAP_FLAGS="--with-imap --with-imap-ssl --with-kerberos" ;;
          esac
          if [ "${{ matrix.target }}" = "macos-arm64" ]; then
            # All keg-only formulae need explicit prefix; PHP gd-related flags
            # accept =PREFIX form per-library.
            GD_FLAGS="--enable-gd --with-jpeg=$(brew --prefix jpeg-turbo) --with-webp=$(brew --prefix webp) --with-freetype=$(brew --prefix freetype) --with-xpm=$(brew --prefix libxpm)"
            if [ "${{ env.legacy_ssl }}" = "true" ]; then
              # PHP 7.4's bundled GD configure test still fails on modern
              # macOS/Homebrew. Skip GD flags for this legacy slot.
              GD_FLAGS=""
              # macOS 15 no longer auto-resolves libresolv symbols used by
              # ext/standard/dns (e.g. _res_9_search), so force link.
              export LIBS="-lresolv $LIBS"
            fi
            PG_FLAGS="--with-pgsql=$(brew --prefix libpq) --with-pdo-pgsql=$(brew --prefix libpq)"
            TIDY_FLAGS="--with-tidy=$(brew --prefix tidy-html5)"
            LDAP_FLAGS="--with-ldap=$(brew --prefix openldap)"
            GETTEXT_FLAGS="--with-gettext=$(brew --prefix gettext)"
            case "$MM" in
              5.*|7.0|7.1) ;;
              *)
                ARGON2_FLAGS="--with-password-argon2=$(brew --prefix argon2)"
                SODIUM_FLAGS="--with-sodium=$(brew --prefix libsodium)"
                ;;
            esac
          fi
          ./configure --prefix="$PREFIX" \
            --enable-fpm --enable-cli --enable-cgi \
            --enable-opcache \
            --enable-mbstring --enable-bcmath --enable-soap \
            $INTL_FLAG --enable-pcntl --enable-sockets --enable-exif \
            --enable-ftp --enable-shmop --enable-sysvmsg --enable-sysvsem --enable-sysvshm \
            --enable-calendar --enable-dba \
            --with-openssl $CURL_FLAG $ZIP_FLAG $ZLIB_FLAG $BZ2_FLAG \
            --with-mysqli --with-pdo-mysql --with-pdo-sqlite --with-sqlite3 \
            $PG_FLAGS \
            $ARGON2_FLAGS $SODIUM_FLAGS \
            $READLINE_FLAG --with-xsl $TIDY_FLAGS $LDAP_FLAGS $GETTEXT_FLAGS \
            $PCRE_JIT_FLAG \
            $GD_FLAGS \
            $GMP_FLAG $ICONV_FLAG
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) 2>&1 | tail -20
          make install
          ls "$PREFIX/bin/" "$PREFIX/sbin/"

      # ── Install PECL extensions via phpize (pecl tool not bundled with PHP 8+).
      # Download each extension's source from pecl.php.net, run phpize +
      # configure + make install. Versions per PHP minor are tested for
      # compatibility (Imagick #709 etc).
      - name: Install PECL extensions (Linux modern + macOS)
        if: (matrix.target == 'macos-arm64' || (matrix.target == 'linux-x64' && env.legacy_ssl != 'true')) && env.skip_source != 'true'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          MM="${{ steps.ver.outputs.major_minor }}"
          PREFIX="${{ github.workspace }}/install/php-${VER}"
          export PATH="$PREFIX/bin:$PATH"
          # Build deps for ext native libs
          if [ "${{ matrix.target }}" = "macos-arm64" ]; then
            brew install --formula imagemagick libmemcached libyaml pcre2 || true
            export LDFLAGS="-L$(brew --prefix libmemcached)/lib -L$(brew --prefix libyaml)/lib -L$(brew --prefix imagemagick)/lib $LDFLAGS"
            export CPPFLAGS="-I$(brew --prefix libmemcached)/include -I$(brew --prefix libyaml)/include -I$(brew --prefix imagemagick)/include $CPPFLAGS"
          else
            sudo apt-get install -y -q libmagickwand-dev libmemcached-dev libyaml-dev
          fi
          # Pick PECL version per PHP minor
          case "$MM" in
            7.*)         IMAGICK=3.7.0; XDEBUG=3.4.7; REDIS=6.3.0; MONGODB=1.20.1; APCU=5.1.28; MEMCACHED=3.4.0; SWOOLE=4.8.13; IGBINARY=3.2.16; YAML=2.2.5; OAUTH=2.0.10 ;;
            8.0)         IMAGICK=3.7.0; XDEBUG=3.4.7; REDIS=6.3.0; MONGODB=1.20.1; APCU=5.1.28; MEMCACHED=3.4.0; SWOOLE=5.1.8;  IGBINARY=3.2.16; YAML=2.2.5; OAUTH=2.0.10 ;;
            8.1)         IMAGICK=3.7.0; XDEBUG=3.5.1; REDIS=6.3.0; MONGODB=2.2.1;  APCU=5.1.28; MEMCACHED=3.4.0; SWOOLE=6.1.7;  IGBINARY=3.2.16; YAML=2.2.5; OAUTH=2.0.10 ;;
            8.2|8.3)     IMAGICK=3.7.0; XDEBUG=3.5.1; REDIS=6.3.0; MONGODB=2.2.1;  APCU=5.1.28; MEMCACHED=3.4.0; SWOOLE=6.2.0;  IGBINARY=3.2.16; YAML=2.2.5; OAUTH=2.0.10 ;;
            8.4)         IMAGICK=3.8.1; XDEBUG=3.5.1; REDIS=6.3.0; MONGODB=2.2.1;  APCU=5.1.28; MEMCACHED=3.4.0; SWOOLE=6.2.0;  IGBINARY=3.2.16; YAML=2.2.5; OAUTH= ;;
            8.5)         IMAGICK=3.8.1; XDEBUG=3.5.1; REDIS=6.3.0; MONGODB=2.2.1;  APCU=5.1.28; MEMCACHED=;      SWOOLE=6.2.0;  IGBINARY=3.2.16; YAML=2.2.5; OAUTH= ;;
          esac
          # Manifest accumulates per-extension truth so ops can audit what actually shipped.
          # Format (space-separated): STATUS <name> <version> [short_reason]
          #   PASS <name> <version>
          #   FAIL <name> <version> <short_reason>
          #   SKIP <name> - no-version-for-php-<minor>
          # linux-x64 is the reference build — any FAIL aborts the job. macOS is tolerant.
          MANIFEST="${{ github.workspace }}/pecl-build-manifest-${{ matrix.target }}.txt"
          : > "$MANIFEST"
          echo "# PECL build manifest for PHP $VER on ${{ matrix.target }}" >> "$MANIFEST"
          echo "# generated $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$MANIFEST"
          # verify_pecl_tgz — upstream integrity check before extraction.
          # PECL does NOT publish SHA256 or MD5 for the .tgz download itself
          # (the per-file md5sum attrs inside package.<ver>.xml cover archive
          # contents post-extract, not the tgz bytes). The best upstream
          # integrity signal we have is the <f> (filesize) field exposed by
          # the PEAR REST API at /rest/r/<pkg>/<ver>.xml. We cross-check:
          #   1. Downloaded file is >= 1 KB  (catches empty/truncated responses)
          #   2. Magic bytes are 1F 8B      (catches HTML-as-tgz / PECL 5xx)
          #   3. Byte size matches REST <f> (catches partial/swapped payloads)
          # If REST metadata is unreachable we fall back to (1)+(2) and log
          # `no_upstream_hash` in the manifest so ops can audit which builds
          # ran without the cross-check. Upgrade to SHA256 requires upstream
          # PECL to publish per-release digests — tracked in SECURITY.md.
          verify_pecl_tgz() {
            local name=$1; local ver=$2; local path=$3
            # (1) size floor
            local actual_size
            actual_size=$(wc -c < "$path" 2>/dev/null || echo 0)
            if [ "$actual_size" -lt 1024 ]; then
              echo "::error::PECL $name-$ver downloaded tgz is $actual_size bytes (< 1 KB floor) — likely error page"
              return 1
            fi
            # (2) magic bytes (gzip = 1F 8B)
            local magic
            magic=$(head -c 2 "$path" | od -An -tx1 | tr -d ' \n')
            if [ "$magic" != "1f8b" ]; then
              echo "::error::PECL $name-$ver tgz magic=0x$magic (expected 0x1f8b gzip) — not a tarball"
              return 2
            fi
            # (3) cross-check with PECL REST <f> filesize
            local expected_size
            expected_size=$(curl -fsSL --max-time 15 "https://pecl.php.net/rest/r/${name}/${ver}.xml" 2>/dev/null \
              | grep -oE '<f>[0-9]+</f>' | grep -oE '[0-9]+' | head -1)
            if [ -z "$expected_size" ]; then
              echo "::warning::PECL $name-$ver: REST /rest/r/${name}/${ver}.xml has no <f> filesize — upstream hash/size unavailable"
              # Record manifest line so audit can see which builds ran without cross-check.
              echo "WARN $name $ver no_upstream_hash" >> "$MANIFEST"
              return 0
            fi
            if [ "$actual_size" != "$expected_size" ]; then
              echo "::error::PECL $name-$ver size mismatch: got $actual_size bytes, PECL REST reports $expected_size"
              return 3
            fi
            echo "verify ok: $name-$ver size=$actual_size bytes, magic=0x$magic"
            return 0
          }
          install_pecl_ext() {
            local name=$1; local ver=$2; local extra=$3
            if [ -z "$ver" ]; then
              echo "SKIP $name - no-version-for-php-$MM" >> "$MANIFEST"
              echo "SKIP $name (no version for PHP $MM)"
              return 0
            fi
            echo "::group::install $name-$ver via phpize"
            (
              set -e
              cd /tmp
              rm -rf "${name}-${ver}" && mkdir -p "${name}-build" && cd "${name}-build"
              curl -fsSL -o ext.tgz "https://pecl.php.net/get/${name}-${ver}.tgz" || exit 10
              verify_pecl_tgz "$name" "$ver" ext.tgz || exit 17
              tar xzf ext.tgz || exit 11
              cd "${name}-${ver}" 2>/dev/null || cd "${name}" || exit 12
              "$PREFIX/bin/phpize" || exit 13
              ./configure --with-php-config="$PREFIX/bin/php-config" $extra || exit 14
              make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) 2>&1 | tail -5 || exit 15
              make install || exit 16
            )
            local rc=$?
            echo "::endgroup::"
            if [ $rc -eq 0 ]; then
              echo "PASS $name $ver" >> "$MANIFEST"
              return 0
            fi
            local reason
            case $rc in
              10) reason="download" ;;
              11) reason="extract" ;;
              12) reason="chdir" ;;
              13) reason="phpize" ;;
              14) reason="configure" ;;
              15) reason="make" ;;
              16) reason="install" ;;
              17) reason="hash_mismatch" ;;
              *)  reason="rc=$rc" ;;
            esac
            echo "FAIL $name $ver $reason" >> "$MANIFEST"
            if [ "${{ matrix.target }}" = "linux-x64" ]; then
              echo "::error::PECL $name-$ver failed ($reason) on linux-x64 reference build — aborting"
              return 1
            fi
            echo "::warning::PECL $name-$ver failed ($reason) on ${{ matrix.target }} — continuing (non-reference build)"
            return 0
          }
          # On linux-x64 any install_pecl_ext failure returns non-zero → propagate via || exit 1.
          # On macos-arm64 the helper swallows failure (returns 0) after recording FAIL line.
          install_pecl_ext apcu      "$APCU"      "--enable-apcu" || exit 1
          install_pecl_ext redis     "$REDIS"                     || exit 1
          install_pecl_ext xdebug    "$XDEBUG"                    || exit 1
          install_pecl_ext igbinary  "$IGBINARY"                  || exit 1
          install_pecl_ext yaml      "$YAML"                      || exit 1
          install_pecl_ext imagick   "$IMAGICK"                   || exit 1
          install_pecl_ext mongodb   "$MONGODB"                   || exit 1
          install_pecl_ext swoole    "$SWOOLE"    "--enable-openssl --enable-mysqlnd --enable-sockets" || exit 1
          install_pecl_ext memcached "$MEMCACHED" "--with-libmemcached-dir=$(brew --prefix libmemcached 2>/dev/null || echo /usr)" || exit 1
          install_pecl_ext oauth     "$OAUTH"                     || exit 1
          # IMAP via PECL for 8.4+ (was removed from core in 8.4)
          case "$MM" in
            8.4|8.5)
              if [ "${{ matrix.target }}" = "linux-x64" ]; then
                sudo apt-get install -y -q libc-client-dev libkrb5-dev || true
              fi
              install_pecl_ext imap 1.0.3 || exit 1 ;;
          esac
          echo "===== PECL build manifest (${{ matrix.target }}) ====="
          cat "$MANIFEST"
          # Copy default php.ini and wire extensions
          INI="$PREFIX/lib/php.ini"
          cp "$PREFIX/lib/php.ini-production" "$INI" 2>/dev/null || cp php-${VER}/php.ini-production "$INI" 2>/dev/null || touch "$INI"
          # Find the extensions dir (path varies by PHP version)
          EXT_DIR=$("$PREFIX/bin/php-config" --extension-dir)
          echo "extension_dir = $EXT_DIR" >> "$INI"
          for so in "$EXT_DIR"/*.so; do
            [ -f "$so" ] || continue
            base=$(basename "$so" .so)
            case "$base" in
              opcache|xdebug) echo "zend_extension=$base" >> "$INI" ;;
              *)              echo "extension=$base" >> "$INI" ;;
            esac
          done
          echo "===== PHP modules installed ====="
          "$PREFIX/bin/php" -m

      - name: Smoke test PHP runtime (php -v)
        if: matrix.target != 'windows-x64' && env.skip_source != 'true'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          PREFIX="${{ github.workspace }}/install/php-${VER}"
          if [ "${{ matrix.target }}" = "linux-x64" ] && [ "${{ env.legacy_ssl }}" = "true" ]; then
            export LD_LIBRARY_PATH="$PREFIX/lib:${LD_LIBRARY_PATH:-}"
          fi
          if [ "${{ matrix.target }}" = "macos-arm64" ] && [ "${{ env.legacy_ssl }}" = "true" ]; then
            export DYLD_FALLBACK_LIBRARY_PATH="$PREFIX/lib:$(brew --prefix openssl@1.1)/lib:${DYLD_FALLBACK_LIBRARY_PATH:-}"
          fi
          "$PREFIX/bin/php" -v

      - name: Package — Linux/macOS tar.xz
        if: matrix.target != 'windows-x64' && env.skip_source != 'true'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          cd "${{ github.workspace }}/install/php-${VER}"
          # Deterministic tar: GNU tar on Linux, gtar on macOS (BSD tar lacks
          # --sort / --pax-option). SOURCE_DATE_EPOCH pins mtime across reruns.
          if [ "${{ matrix.target }}" = "macos-arm64" ]; then
            brew install --quiet gnu-tar >/dev/null
            TAR=gtar
          else
            TAR=tar
          fi
          "$TAR" --sort=name --owner=0 --group=0 --numeric-owner \
            --mtime="@${SOURCE_DATE_EPOCH}" \
            --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
            -cJf "${{ github.workspace }}/php-${VER}-${{ matrix.target }}.tar.xz" \
            bin sbin lib include etc
          ls -lh "${{ github.workspace }}/php-${VER}-${{ matrix.target }}.tar.xz"

      # Skip entire upload when no archive was produced for this matrix slot
      # (e.g., PHP 5.6 on macOS/linux where skip_source=true). Windows always
      # has a pre-built archive, so it uploads unconditionally. Keeping the
      # skip logic on the step-level `if:` lets fail_on_unmatched_files stay
      # a static `true` — no string coercion of GitHub Actions expression
      # booleans inside an action input.
      - name: Upload to release
        if: matrix.target == 'windows-x64' || env.skip_source != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: binaries-php-${{ steps.ver.outputs.version }}
          name: PHP ${{ steps.ver.outputs.version }} (cross-platform binaries)
          body: |
            Self-contained PHP ${{ steps.ver.outputs.version }} binaries for use with
            NKS WebDev Console's `wdc binaries install` flow.
            Each archive expands to `bin/php`, `sbin/php-fpm` and supporting libs.
            PECL build truth per platform is in `pecl-build-manifest-<target>.txt` (non-Windows).
          fail_on_unmatched_files: true
          files: php-${{ steps.ver.outputs.version }}-${{ matrix.target }}.${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload PECL manifest only for non-Windows slots (Windows build doesn't run install_pecl_ext).
      - name: Upload PECL manifest
        if: matrix.target != 'windows-x64' && env.skip_source != 'true' && (matrix.target == 'macos-arm64' || env.legacy_ssl != 'true')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: binaries-php-${{ steps.ver.outputs.version }}
          fail_on_unmatched_files: true
          files: pecl-build-manifest-${{ matrix.target }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # When skip_source=true (PHP 5.6/7.0 on Linux/macOS), the main upload
      # step above is skipped entirely. Without any signal on the release,
      # a user running `gh release view binaries-php-7.0.33` sees only the
      # Windows zip and can't tell whether Linux was tried-and-failed or
      # intentionally omitted. Upload an explicit SKIPPED-<target>.txt
      # marker so the omission is self-documenting on the release page.
      - name: Write SKIPPED marker (skip_source=true)
        if: matrix.target != 'windows-x64' && env.skip_source == 'true'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          TGT="${{ matrix.target }}"
          MARK="${{ github.workspace }}/SKIPPED-${TGT}-${VER}.txt"
          cat > "$MARK" <<EOF
          SKIPPED — PHP ${VER} on ${TGT} is not built from source in this workflow.

          Reason: PHP versions before 7.1 have PECL / autoconf / libxml2 / ICU
          toolchain drift (ICU 66+ C++17 ABI, libxml2 2.13+ API changes, OpenSSL
          1.1 vs 3.x) that is prohibitive to maintain in hosted CI runners.

          Options for this PHP version on this platform:
            - Use the Windows prebuilt (windows.php.net) if you only need Win.
            - Build from source locally with a pinned legacy toolchain.
            - Upgrade to PHP 7.4+ where cross-platform source builds are CI-stable.

          Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Commit:   ${{ github.sha }}
          EOF
          ls -l "$MARK"

      - name: Upload SKIPPED marker to release
        if: matrix.target != 'windows-x64' && env.skip_source == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: binaries-php-${{ steps.ver.outputs.version }}
          name: PHP ${{ steps.ver.outputs.version }} (cross-platform binaries)
          body: |
            Self-contained PHP ${{ steps.ver.outputs.version }} binaries for use with
            NKS WebDev Console's `wdc binaries install` flow.
            Each archive expands to `bin/php`, `sbin/php-fpm` and supporting libs.
          fail_on_unmatched_files: true
          files: SKIPPED-${{ matrix.target }}-${{ steps.ver.outputs.version }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
