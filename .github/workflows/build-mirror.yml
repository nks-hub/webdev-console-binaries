name: Mirror Upstream Binaries (caddy, cloudflared, mailpit)

# Mirror cross-platform binaries from upstream GitHub releases under our
# naming convention so the catalog API can point at stable URLs and we
# control the lifetime of each release. Same pattern as build-mkcert.yml.
#
# Trigger:
#   git tag binaries-caddy-2.10.2 && git push origin binaries-caddy-2.10.2
#   git tag binaries-cloudflared-2026.3.0 && git push origin ...
#   git tag binaries-mailpit-1.29.6 && git push origin ...

on:
  push:
    tags:
      - 'binaries-caddy-*'
      - 'binaries-cloudflared-*'
      - 'binaries-mailpit-*'
  workflow_dispatch:
    inputs:
      app:
        description: 'caddy / cloudflared / mailpit'
        required: true
        type: choice
        options: [caddy, cloudflared, mailpit]
      version:
        description: 'Upstream version (no v prefix)'
        required: true
        type: string

concurrency:
  # Serialize runs targeting the same release tag so -r2/-r3 retry
  # pushes don't race softprops/action-gh-release uploads. Different
  # apps/versions mirror in parallel. cancel-in-progress=false keeps a
  # long-running mirror from being killed by a metadata re-tag.
  # This workflow handles 3 apps (caddy/cloudflared/mailpit) so the key
  # includes `app` too; push events use github.ref which already encodes the app.
  group: ${{ github.workflow }}-${{ github.event.inputs.app || '' }}-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve app + version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            APP="${{ github.event.inputs.app }}"
            VERSION="${{ github.event.inputs.version }}"
          else
            REF="${GITHUB_REF_NAME}"  # e.g. binaries-caddy-2.10.2
            APP="${REF#binaries-}"
            APP="${APP%%-*}"          # caddy
            RAW="${REF#binaries-${APP}-}"
            VERSION="${RAW%-r*}"
          fi
          echo "app=$APP" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Mirroring $APP $VERSION"

      - name: Download per-app upstream artifacts
        id: download
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APP="${{ steps.ver.outputs.app }}"
          VER="${{ steps.ver.outputs.version }}"

          # Scrub any transient archives that would otherwise leak into the
          # upload step as dead-weight duplicates of the extracted bare
          # binaries. See HIGH-D1 in docs/reviews/2026-04-18-binaries-repo-deep-review.md.
          rm -f ./*.tgz ./*.tar.gz ./*.zip
          rm -f cloudflared-*-macos-x64.tgz cloudflared-*-macos-arm64.tgz
          rm -f darwin-amd64.tgz darwin-arm64.tgz

          # ── Supply-chain verification helpers (MEDIUM-D3).
          # Mirror the pattern from build-mariadb.yml PR #9. Each upstream
          # publishes integrity metadata in a slightly different shape:
          #   caddy   → caddy_${VER}_checksums.txt (SHA-512, "hash  name")
          #   mailpit → per-asset GitHub REST digest (no sidecar file)
          #   cloudfl → per-asset GitHub REST digest (no sidecar file)
          # Abort the build on mismatch; fall back to magic-byte + size-floor
          # guards with ::warning::no_upstream_hash when the manifest/digest
          # is genuinely unavailable (PR #12 PECL fallback pattern).

          # _fake_file_guard: when no upstream hash is available, reject
          # obviously poisoned payloads (HTML error page, truncated
          # download). Mirrors the PR #2 Apache magic-byte approach + a
          # conservative 50 KB size floor. Binaries and archives alike
          # comfortably exceed this for these three apps.
          _fake_file_guard() {
            local file="$1"
            local size
            size=$(wc -c <"$file" | tr -d ' ')
            if [ "${size:-0}" -lt 51200 ]; then
              echo "::error::$file is ${size}B — below 50 KB size floor; refusing to ship unverified tiny payload" >&2
              return 1
            fi
            local head4
            head4=$(head -c 4 "$file" | xxd -p)
            case "$file" in
              *.tar.gz|*.tgz)
                case "$head4" in 1f8b*) : ;; *) echo "::error::$file missing gzip magic (got ${head4})" >&2; return 1 ;; esac ;;
              *.zip)
                [ "$head4" = "504b0304" ] || { echo "::error::$file missing ZIP magic (got ${head4})" >&2; return 1; } ;;
              *.exe)
                case "$head4" in 4d5a*) : ;; *) echo "::error::$file missing PE/MZ magic (got ${head4})" >&2; return 1 ;; esac ;;
            esac
            echo "✓ $file magic-byte + size-floor guards passed (unverified upstream hash)"
          }

          # verify_from_sums: fetch a sums-manifest (space-separated
          # "<hash>  <filename>" lines), look up the upstream filename,
          # compare against local hash. $4 selects the hash tool
          # (sha256sum | sha512sum) — caddy uses SHA-512.
          verify_from_sums() {
            local file="$1" sums_url="$2" upstream_name="$3" tool="${4:-sha256sum}"
            local sums_file="upstream-sums.txt"
            if ! curl -fsSL "$sums_url" -o "$sums_file"; then
              echo "::warning::no_upstream_hash — $sums_url unreachable; $file shipped unverified" >&2
              _fake_file_guard "$file" || return 1
              return 0
            fi
            local expected
            expected=$(awk -v f="$upstream_name" '$NF == f {print tolower($1); exit}' "$sums_file")
            if [ -z "$expected" ]; then
              echo "::warning::no_upstream_hash — $upstream_name not found in $sums_url; $file shipped unverified" >&2
              _fake_file_guard "$file" || return 1
              return 0
            fi
            local actual
            actual=$("$tool" "$file" | awk '{print $1}')
            if [ "$expected" != "$actual" ]; then
              echo "::error::${tool} mismatch for $file (upstream $upstream_name) — expected $expected, got $actual" >&2
              return 1
            fi
            echo "✓ ${tool} verified ($file via $upstream_name): $actual"
          }

          # verify_github_digest: mailpit + cloudflared don't ship sidecar
          # hash files, but GitHub's REST API exposes a per-asset
          # `digest: sha256:<hex>` field populated at upload time. Use `gh`
          # to pull it and compare sha256sum locally.
          verify_github_digest() {
            local file="$1" repo="$2" tag="$3" upstream_name="$4"
            local expected
            expected=$(gh api "repos/${repo}/releases/tags/${tag}" \
              --jq ".assets[] | select(.name==\"${upstream_name}\") | .digest" 2>/dev/null \
              | sed -n 's/^sha256://p')
            if [ -z "$expected" ]; then
              echo "::warning::no_upstream_hash — GitHub digest missing for ${repo}@${tag}/${upstream_name}; $file shipped unverified" >&2
              _fake_file_guard "$file" || return 1
              return 0
            fi
            local actual
            actual=$(sha256sum "$file" | awk '{print $1}')
            if [ "$expected" != "$actual" ]; then
              echo "::error::SHA256 mismatch for $file (GitHub digest ${repo}/${upstream_name}) — expected $expected, got $actual" >&2
              return 1
            fi
            echo "✓ GitHub sha256 digest verified ($file via ${repo}/${upstream_name}): $actual"
          }

          # Cross-platform upload list built per-case so we enumerate only
          # the final named assets (never transient .tgz workspace state).
          ASSETS=()

          case "$APP" in
            caddy)
              # caddyserver/caddy releases — tar.gz for unix, zip for windows.
              # Caddy publishes caddy_${VER}_checksums.txt at the release
              # root containing SHA-512 for every published asset.
              BASE="https://github.com/caddyserver/caddy/releases/download/v${VER}"
              SUMS="${BASE}/caddy_${VER}_checksums.txt"
              curl -fsSL -o "caddy-${VER}-linux-x64.tar.gz"   "${BASE}/caddy_${VER}_linux_amd64.tar.gz"
              curl -fsSL -o "caddy-${VER}-macos-arm64.tar.gz" "${BASE}/caddy_${VER}_mac_arm64.tar.gz"
              curl -fsSL -o "caddy-${VER}-windows-x64.zip"    "${BASE}/caddy_${VER}_windows_amd64.zip"
              verify_from_sums "caddy-${VER}-linux-x64.tar.gz"   "$SUMS" "caddy_${VER}_linux_amd64.tar.gz" sha512sum
              verify_from_sums "caddy-${VER}-macos-arm64.tar.gz" "$SUMS" "caddy_${VER}_mac_arm64.tar.gz"   sha512sum
              verify_from_sums "caddy-${VER}-windows-x64.zip"    "$SUMS" "caddy_${VER}_windows_amd64.zip"  sha512sum
              ASSETS+=(
                "caddy-${VER}-linux-x64.tar.gz"
                "caddy-${VER}-macos-arm64.tar.gz"
                "caddy-${VER}-windows-x64.zip"
              )
              ;;
            cloudflared)
              # cloudflare/cloudflared. Linux + Windows ship as single static
              # binaries; macOS is a tarball that contains the binary.
              # No sidecar .sha256 files on current releases; rely on
              # GitHub's REST API per-asset digest field instead.
              REPO="cloudflare/cloudflared"
              TAG="${VER}"
              BASE="https://github.com/${REPO}/releases/download/${TAG}"

              cf_fetch() {
                local local_name="$1" upstream_name="$2"
                curl -fsSL -o "$local_name" "${BASE}/${upstream_name}"
                verify_github_digest "$local_name" "$REPO" "$TAG" "$upstream_name"
              }
              cf_fetch "cloudflared-${VER}-linux-x64"       "cloudflared-linux-amd64"
              cf_fetch "cloudflared-${VER}-linux-arm64"     "cloudflared-linux-arm64"
              cf_fetch "cloudflared-${VER}-windows-x64.exe" "cloudflared-windows-amd64.exe"

              # Both macOS arches ship as tgz; verify the upstream tgz
              # digest BEFORE extraction, then rename the single binary out
              # so naming matches the daemon's expected
              # ${app}-${ver}-${os}-${arch} pattern. The intermediate .tgz
              # is deleted immediately after extraction so it cannot leak
              # into the upload step.
              extract_darwin() {
                local arch_in="$1" arch_out="$2" tgz="darwin-${arch_in}.tgz"
                local upstream_name="cloudflared-darwin-${arch_in}.tgz"
                curl -fsSL -o "$tgz" "${BASE}/${upstream_name}"
                verify_github_digest "$tgz" "$REPO" "$TAG" "$upstream_name"
                tar xzf "$tgz"
                mv cloudflared "cloudflared-${VER}-macos-${arch_out}"
                rm -f "$tgz"
              }
              extract_darwin amd64 x64
              extract_darwin arm64 arm64

              chmod +x \
                "cloudflared-${VER}-linux-x64" \
                "cloudflared-${VER}-linux-arm64" \
                "cloudflared-${VER}-macos-x64" \
                "cloudflared-${VER}-macos-arm64"

              ASSETS+=(
                "cloudflared-${VER}-linux-x64"
                "cloudflared-${VER}-linux-arm64"
                "cloudflared-${VER}-macos-x64"
                "cloudflared-${VER}-macos-arm64"
                "cloudflared-${VER}-windows-x64.exe"
              )
              ;;
            mailpit)
              # axllent/mailpit — tar.gz per platform with bin inside.
              # Mailpit doesn't publish a checksums.txt asset; rely on
              # GitHub's REST API per-asset digest field.
              REPO="axllent/mailpit"
              TAG="v${VER}"
              BASE="https://github.com/${REPO}/releases/download/${TAG}"

              mp_fetch() {
                local local_name="$1" upstream_name="$2"
                curl -fsSL -o "$local_name" "${BASE}/${upstream_name}"
                verify_github_digest "$local_name" "$REPO" "$TAG" "$upstream_name"
              }
              mp_fetch "mailpit-${VER}-linux-x64.tar.gz"   "mailpit-linux-amd64.tar.gz"
              mp_fetch "mailpit-${VER}-macos-arm64.tar.gz" "mailpit-darwin-arm64.tar.gz"
              mp_fetch "mailpit-${VER}-windows-x64.zip"    "mailpit-windows-amd64.zip"
              ASSETS+=(
                "mailpit-${VER}-linux-x64.tar.gz"
                "mailpit-${VER}-macos-arm64.tar.gz"
                "mailpit-${VER}-windows-x64.zip"
              )
              ;;
            *)
              echo "Unknown app: $APP"; exit 1 ;;
          esac

          # Verify every declared asset exists + is non-empty before we let
          # the upload step see the workspace. Fail loud if the case above
          # skipped one.
          for f in "${ASSETS[@]}"; do
            if [ ! -s "$f" ]; then
              echo "::error::expected asset missing or empty: $f"
              exit 1
            fi
          done

          # Publish newline-separated list for the upload step.
          {
            echo 'files<<EOF'
            printf '%s\n' "${ASSETS[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "Final asset set:"
          ls -lh "${ASSETS[@]}"

      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: binaries-${{ steps.ver.outputs.app }}-${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.app }} ${{ steps.ver.outputs.version }} (cross-platform binaries)
          body: |
            Mirror of upstream **${{ steps.ver.outputs.app }} ${{ steps.ver.outputs.version }}** for use with NKS WebDev Console's `wdc binaries install` flow. File naming follows the catalog's `${app}-${version}-${os}-${arch}` convention so the daemon's `BinaryDownloader` can resolve URLs without per-app special cases.
          fail_on_unmatched_files: true
          files: ${{ steps.download.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
