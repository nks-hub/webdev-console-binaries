name: Mirror Upstream Binaries (caddy, cloudflared, mailpit)

# Mirror cross-platform binaries from upstream GitHub releases under our
# naming convention so the catalog API can point at stable URLs and we
# control the lifetime of each release. Same pattern as build-mkcert.yml.
#
# Trigger:
#   git tag binaries-caddy-2.10.2 && git push origin binaries-caddy-2.10.2
#   git tag binaries-cloudflared-2026.3.0 && git push origin ...
#   git tag binaries-mailpit-1.29.6 && git push origin ...

on:
  push:
    tags:
      - 'binaries-caddy-*'
      - 'binaries-cloudflared-*'
      - 'binaries-mailpit-*'
  workflow_dispatch:
    inputs:
      app:
        description: 'caddy / cloudflared / mailpit'
        required: true
        type: choice
        options: [caddy, cloudflared, mailpit]
      version:
        description: 'Upstream version (no v prefix)'
        required: true
        type: string

concurrency:
  # Serialize runs targeting the same release tag so -r2/-r3 retry
  # pushes don't race softprops/action-gh-release uploads. Different
  # apps/versions mirror in parallel. cancel-in-progress=false keeps a
  # long-running mirror from being killed by a metadata re-tag.
  # This workflow handles 3 apps (caddy/cloudflared/mailpit) so the key
  # includes `app` too; push events use github.ref which already encodes the app.
  group: ${{ github.workflow }}-${{ github.event.inputs.app || '' }}-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve app + version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            APP="${{ github.event.inputs.app }}"
            VERSION="${{ github.event.inputs.version }}"
          else
            REF="${GITHUB_REF_NAME}"  # e.g. binaries-caddy-2.10.2
            APP="${REF#binaries-}"
            APP="${APP%%-*}"          # caddy
            RAW="${REF#binaries-${APP}-}"
            VERSION="${RAW%-r*}"
          fi
          echo "app=$APP" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Mirroring $APP $VERSION"

      - name: Download per-app upstream artifacts
        id: download
        shell: bash
        run: |
          set -euo pipefail
          APP="${{ steps.ver.outputs.app }}"
          VER="${{ steps.ver.outputs.version }}"

          # Scrub any transient archives that would otherwise leak into the
          # upload step as dead-weight duplicates of the extracted bare
          # binaries. See HIGH-D1 in docs/reviews/2026-04-18-binaries-repo-deep-review.md.
          rm -f ./*.tgz ./*.tar.gz ./*.zip
          rm -f cloudflared-*-macos-x64.tgz cloudflared-*-macos-arm64.tgz
          rm -f darwin-amd64.tgz darwin-arm64.tgz

          # Cross-platform upload list built per-case so we enumerate only
          # the final named assets (never transient .tgz workspace state).
          ASSETS=()

          case "$APP" in
            caddy)
              # caddyserver/caddy releases — tar.gz for unix, zip for windows
              BASE="https://github.com/caddyserver/caddy/releases/download/v${VER}"
              curl -fsSL -o "caddy-${VER}-linux-x64.tar.gz"   "${BASE}/caddy_${VER}_linux_amd64.tar.gz"
              curl -fsSL -o "caddy-${VER}-macos-arm64.tar.gz" "${BASE}/caddy_${VER}_mac_arm64.tar.gz"
              curl -fsSL -o "caddy-${VER}-windows-x64.zip"    "${BASE}/caddy_${VER}_windows_amd64.zip"
              ASSETS+=(
                "caddy-${VER}-linux-x64.tar.gz"
                "caddy-${VER}-macos-arm64.tar.gz"
                "caddy-${VER}-windows-x64.zip"
              )
              ;;
            cloudflared)
              # cloudflare/cloudflared. Linux + Windows ship as single static
              # binaries; macOS is a tarball that contains the binary.
              BASE="https://github.com/cloudflare/cloudflared/releases/download/${VER}"
              curl -fsSL -o "cloudflared-${VER}-linux-x64"       "${BASE}/cloudflared-linux-amd64"
              curl -fsSL -o "cloudflared-${VER}-linux-arm64"     "${BASE}/cloudflared-linux-arm64"
              curl -fsSL -o "cloudflared-${VER}-windows-x64.exe" "${BASE}/cloudflared-windows-amd64.exe"

              # Both macOS arches ship as tgz; extract single binary out so
              # naming matches the daemon's expected ${app}-${ver}-${os}-${arch}
              # pattern. The intermediate .tgz is deleted immediately after
              # extraction so it cannot leak into the upload step.
              extract_darwin() {
                local arch_in="$1" arch_out="$2" tgz="darwin-${arch_in}.tgz"
                curl -fsSL -o "$tgz" "${BASE}/cloudflared-darwin-${arch_in}.tgz"
                tar xzf "$tgz"
                mv cloudflared "cloudflared-${VER}-macos-${arch_out}"
                rm -f "$tgz"
              }
              extract_darwin amd64 x64
              extract_darwin arm64 arm64

              chmod +x \
                "cloudflared-${VER}-linux-x64" \
                "cloudflared-${VER}-linux-arm64" \
                "cloudflared-${VER}-macos-x64" \
                "cloudflared-${VER}-macos-arm64"

              ASSETS+=(
                "cloudflared-${VER}-linux-x64"
                "cloudflared-${VER}-linux-arm64"
                "cloudflared-${VER}-macos-x64"
                "cloudflared-${VER}-macos-arm64"
                "cloudflared-${VER}-windows-x64.exe"
              )
              ;;
            mailpit)
              # axllent/mailpit — tar.gz per platform with bin inside
              BASE="https://github.com/axllent/mailpit/releases/download/v${VER}"
              curl -fsSL -o "mailpit-${VER}-linux-x64.tar.gz"   "${BASE}/mailpit-linux-amd64.tar.gz"
              curl -fsSL -o "mailpit-${VER}-macos-arm64.tar.gz" "${BASE}/mailpit-darwin-arm64.tar.gz"
              curl -fsSL -o "mailpit-${VER}-windows-x64.zip"    "${BASE}/mailpit-windows-amd64.zip"
              ASSETS+=(
                "mailpit-${VER}-linux-x64.tar.gz"
                "mailpit-${VER}-macos-arm64.tar.gz"
                "mailpit-${VER}-windows-x64.zip"
              )
              ;;
            *)
              echo "Unknown app: $APP"; exit 1 ;;
          esac

          # Verify every declared asset exists + is non-empty before we let
          # the upload step see the workspace. Fail loud if the case above
          # skipped one.
          for f in "${ASSETS[@]}"; do
            if [ ! -s "$f" ]; then
              echo "::error::expected asset missing or empty: $f"
              exit 1
            fi
          done

          # Publish newline-separated list for the upload step.
          {
            echo 'files<<EOF'
            printf '%s\n' "${ASSETS[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "Final asset set:"
          ls -lh "${ASSETS[@]}"

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: binaries-${{ steps.ver.outputs.app }}-${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.app }} ${{ steps.ver.outputs.version }} (cross-platform binaries)
          body: |
            Mirror of upstream **${{ steps.ver.outputs.app }} ${{ steps.ver.outputs.version }}** for use with NKS WebDev Console's `wdc binaries install` flow. File naming follows the catalog's `${app}-${version}-${os}-${arch}` convention so the daemon's `BinaryDownloader` can resolve URLs without per-app special cases.
          fail_on_unmatched_files: true
          files: ${{ steps.download.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
