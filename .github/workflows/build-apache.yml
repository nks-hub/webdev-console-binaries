name: Build Apache HTTPD Binaries

# Apache HTTP Server cross-platform binary builder.
#   Windows: ApacheLounge precompiled VS17 (matches what the daemon's Plugin.Apache expects)
#   Linux x64: build from source on ubuntu-24.04 with apr/apr-util/pcre2
#   macOS arm64: build from source on macos-14 with Homebrew apr/apr-util/pcre2
#
# Trigger:
#   git tag binaries-apache-2.4.66 && git push origin binaries-apache-2.4.66

on:
  push:
    tags:
      - 'binaries-apache-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Apache version, e.g. 2.4.66'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows-x64
            ext: zip
          - os: macos-14
            target: macos-arm64
            ext: tar.xz
          - os: ubuntu-24.04
            target: linux-x64
            ext: tar.xz
    runs-on: ${{ matrix.os }}

    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME#binaries-apache-}"
            VERSION="${RAW%-r*}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Apache $VERSION for ${{ matrix.target }}"

      # ── Windows: ApacheLounge precompiled ──
      - name: Windows — download ApacheLounge build
        if: matrix.target == 'windows-x64'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          # ApacheLounge filenames embed the build date as a 6-digit suffix
          # (httpd-2.4.66-250207-win64-VS17.zip). Always scrape the index
          # rather than guess — the suffix changes per release.
          HTML=$(curl -fsSL -A "Mozilla/5.0 NKS-WDC/1.0" "https://www.apachelounge.com/download/VS17/")
          REL_PATH=$(echo "$HTML" | grep -oE "httpd-${VER}-[0-9]+-win64-VS17\\.zip" | head -1)
          [ -z "$REL_PATH" ] && { echo "Apache $VER not found on ApacheLounge index"; exit 1; }
          URL="https://www.apachelounge.com/download/VS17/binaries/${REL_PATH}"
          echo "Resolved ApacheLounge URL: $URL"
          curl -fsSL -A "Mozilla/5.0 NKS-WDC/1.0" -o "httpd-${VER}-windows-x64.zip" "$URL"
          ls -lh "httpd-${VER}-windows-x64.zip"

      # ── Linux: source build with apr/apr-util/pcre2 ──
      - name: Linux — install build deps
        if: matrix.target == 'linux-x64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential libapr1-dev libaprutil1-dev \
            libpcre2-dev libssl-dev libxml2-dev zlib1g-dev libnghttp2-dev \
            libbrotli-dev liblua5.4-dev libcurl4-openssl-dev libjansson-dev pkg-config

      - name: macOS — install build deps
        if: matrix.target == 'macos-arm64'
        run: |
          brew install --formula apr apr-util pcre2 openssl@3 libxml2 zlib \
            nghttp2 brotli lua curl jansson pkg-config

      - name: Build Apache from source (Linux/macOS)
        if: matrix.target != 'windows-x64'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          curl -fsSL -o httpd-src.tar.gz "https://archive.apache.org/dist/httpd/httpd-${VER}.tar.gz"
          tar xf httpd-src.tar.gz
          cd httpd-${VER}
          PREFIX="${{ github.workspace }}/install/httpd-${VER}"
          if [ "${{ matrix.target }}" = "macos-arm64" ]; then
            APR_FLAGS="--with-apr=$(brew --prefix apr) --with-apr-util=$(brew --prefix apr-util)"
            SSL_FLAGS="--with-ssl=$(brew --prefix openssl@3)"
            PCRE_FLAGS="--with-pcre=$(brew --prefix pcre2)/bin/pcre2-config"
            EXTRA_FLAGS="--with-z=$(brew --prefix zlib) --with-libxml2=$(brew --prefix libxml2)"
          else
            # On Ubuntu the apt libapr1-dev / libaprutil1-dev install to /usr.
            # --with-included-apr would need apr/apr-util sources unpacked into
            # ./srclib/ which we'd have to download separately; system pkgs work fine.
            APR_FLAGS="--with-apr=/usr --with-apr-util=/usr"
            SSL_FLAGS="--with-ssl"
            PCRE_FLAGS="--with-pcre=/usr/bin/pcre2-config"
            EXTRA_FLAGS=""
          fi
          if [ "${{ matrix.target }}" = "macos-arm64" ]; then
            HTTP2_FLAGS="--enable-http2 --with-nghttp2=$(brew --prefix nghttp2)"
            BROTLI_FLAGS="--enable-brotli --with-brotli=$(brew --prefix brotli)"
            # mod_md needs jansson via pkg-config; brew's jansson installs to
            # /opt/homebrew but Apache configure doesn't auto-pick that path.
            MD_FLAGS="--with-jansson=$(brew --prefix jansson)"
            export PKG_CONFIG_PATH="$(brew --prefix jansson)/lib/pkgconfig:$(brew --prefix nghttp2)/lib/pkgconfig:$PKG_CONFIG_PATH"
          else
            HTTP2_FLAGS="--enable-http2"
            BROTLI_FLAGS="--enable-brotli"
            MD_FLAGS=""
          fi
          ./configure --prefix="$PREFIX" \
            --enable-so --enable-ssl --enable-rewrite --enable-proxy \
            --enable-proxy-fcgi --enable-proxy-http --enable-proxy-balancer \
            --enable-proxy-wstunnel --enable-headers --enable-deflate \
            --enable-expires --enable-mime-magic --enable-vhost-alias \
            --enable-cgi --enable-cgid --enable-info --enable-status \
            --enable-md --enable-remoteip \
            --enable-session --enable-session-cookie --enable-session-crypto \
            --enable-macro --enable-ratelimit --enable-substitute \
            --enable-unique-id --enable-log-forensic --enable-dumpio \
            --enable-dav --enable-dav-fs --enable-dav-lock \
            --enable-cache --enable-cache-disk --enable-cache-socache \
            --enable-socache-shmcb --enable-socache-memcache --enable-socache-redis \
            --enable-lua --enable-watchdog --enable-buffer --enable-reqtimeout \
            --enable-authn-socache --enable-authnz-fcgi \
            --enable-mods-shared=reallyall \
            $HTTP2_FLAGS $BROTLI_FLAGS $MD_FLAGS \
            $APR_FLAGS $SSL_FLAGS $PCRE_FLAGS $EXTRA_FLAGS
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) 2>&1 | tail -10
          make install
          ls "$PREFIX/bin/" "$PREFIX/modules/" | head -10

      - name: Package — Linux/macOS tar.xz
        if: matrix.target != 'windows-x64'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          cd "${{ github.workspace }}/install/httpd-${VER}"
          # Apache install layout doesn't include sbin or lib by default — bin/ holds
          # both httpd and helper tools, modules/ holds the .so MPM/extensions, conf/
          # holds httpd.conf + extra/. Skip sbin/lib since they're empty/missing.
          ls -d */ 2>&1 | head
          tar -cJf "${{ github.workspace }}/httpd-${VER}-${{ matrix.target }}.tar.xz" \
            bin include modules conf $(ls -d build error htdocs icons logs man manual cgi-bin 2>/dev/null) \
            $(test -d sbin && echo sbin) $(test -d lib && echo lib)
          ls -lh "${{ github.workspace }}/httpd-${VER}-${{ matrix.target }}.tar.xz"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: binaries-apache-${{ steps.ver.outputs.version }}
          name: Apache HTTPD ${{ steps.ver.outputs.version }} (cross-platform binaries)
          body: |
            Self-contained Apache HTTPD ${{ steps.ver.outputs.version }} binaries for
            NKS WebDev Console's `wdc binaries install apache@${{ steps.ver.outputs.version }}` flow.
            Each archive expands to `bin/httpd`, `modules/*.so` and supporting files.
          fail_on_unmatched_files: true
          files: httpd-${{ steps.ver.outputs.version }}-${{ matrix.target }}.${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
