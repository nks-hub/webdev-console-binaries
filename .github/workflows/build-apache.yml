name: Build Apache HTTPD Binaries

# Apache HTTP Server cross-platform binary builder.
#   Windows: ApacheLounge precompiled VS17 (matches what the daemon's Plugin.Apache expects)
#   Linux x64: build from source on ubuntu-24.04 with apr/apr-util/pcre2
#   macOS arm64: build from source on macos-14 with Homebrew apr/apr-util/pcre2
#
# Trigger:
#   git tag binaries-apache-2.4.66 && git push origin binaries-apache-2.4.66

on:
  push:
    tags:
      - 'binaries-apache-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Apache version, e.g. 2.4.66'
        required: true
        type: string

concurrency:
  # Serialize runs targeting the same release tag so -r2/-r3 retry
  # pushes don't race softprops/action-gh-release uploads. Different
  # versions build in parallel. cancel-in-progress=false keeps a
  # long-running build from being killed by a metadata re-tag.
  group: ${{ github.workflow }}-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows-x64
            ext: zip
          - os: macos-14
            target: macos-arm64
            ext: tar.xz
          - os: ubuntu-24.04
            target: linux-x64
            ext: tar.xz
    runs-on: ${{ matrix.os }}

    steps:
      - name: Set SOURCE_DATE_EPOCH (reproducibility)
        shell: bash
        run: |
          # Pin mtime + autoconf/GNU-toolchain timestamps to a deterministic
          # epoch so two re-runs of the same tag produce byte-identical
          # archives. Honored by autoconf, libtool, tar (with --mtime).
          TS="${{ github.event.head_commit.timestamp }}"
          if [ -n "$TS" ]; then
            SDE=$(date -d "$TS" +%s 2>/dev/null || python3 -c "import sys,datetime;print(int(datetime.datetime.fromisoformat(sys.argv[1].replace('Z','+00:00')).timestamp()))" "$TS" 2>/dev/null || echo "")
          fi
          [ -z "$SDE" ] && SDE=$(date +%s)
          echo "SOURCE_DATE_EPOCH=$SDE" >> "$GITHUB_ENV"
          echo "SOURCE_DATE_EPOCH=$SDE"

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME#binaries-apache-}"
            VERSION="${RAW%-r*}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Apache $VERSION for ${{ matrix.target }}"

      # ── Windows: ApacheLounge precompiled ──
      - name: Windows — download ApacheLounge build
        if: matrix.target == 'windows-x64'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          # ApacheLounge filenames embed the build date as a 6-digit suffix
          # (httpd-2.4.66-250207-win64-VS17.zip). Always scrape the index
          # rather than guess — the suffix changes per release.
          HTML=$(curl -fsSL -A "Mozilla/5.0 NKS-WDC/1.0" "https://www.apachelounge.com/download/VS17/")
          REL_PATH=$(echo "$HTML" | grep -oE "httpd-${VER}-[0-9]+-win64-VS17\\.zip" | head -1)
          [ -z "$REL_PATH" ] && { echo "Apache $VER not found on ApacheLounge index"; exit 1; }
          URL="https://www.apachelounge.com/download/VS17/binaries/${REL_PATH}"
          echo "Resolved ApacheLounge URL: $URL"
          curl -fsSL -A "Mozilla/5.0 NKS-WDC/1.0" -o "httpd-${VER}-windows-x64.zip" "$URL"
          # ── Supply-chain verification: ApacheLounge publishes a per-file
          # .txt sidecar containing multiple hashes (SHA1..SHA512) in a
          # human-readable format produced by GPGHash. Grep the SHA256 line
          # and compare with local hash. Abort on mismatch or missing entry.
          # TODO(SECURITY.md roadmap): additionally verify the detached PGP
          # .asc signature (Steffen_Land.asc) once the ApacheLounge keyring
          # is bootstrapped into CI.
          SUMS_URL="https://www.apachelounge.com/download/VS17/binaries/${REL_PATH}.txt"
          curl -fsSL -A "Mozilla/5.0 NKS-WDC/1.0" "$SUMS_URL" -o al-checksums.txt
          expected=$(awk '/^SHA256-Checksum/{found=1; next} found && NF==1 {print tolower($1); exit}' al-checksums.txt)
          if [ -z "$expected" ]; then
            echo "::error::SHA256 entry not found in $SUMS_URL" >&2
            exit 1
          fi
          actual=$(sha256sum "httpd-${VER}-windows-x64.zip" | awk '{print $1}')
          if [ "$expected" != "$actual" ]; then
            echo "::error::SHA256 mismatch for ${REL_PATH} — expected $expected, got $actual" >&2
            exit 1
          fi
          echo "✓ SHA256 verified (${REL_PATH}): $actual"
          ls -lh "httpd-${VER}-windows-x64.zip"

      # ── Linux: source build with apr/apr-util/pcre2 ──
      - name: Linux — install build deps
        if: matrix.target == 'linux-x64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential libapr1-dev libaprutil1-dev \
            libpcre2-dev libssl-dev libxml2-dev zlib1g-dev libnghttp2-dev \
            libbrotli-dev liblua5.4-dev libcurl4-openssl-dev libjansson-dev pkg-config

      - name: macOS — install build deps
        if: matrix.target == 'macos-arm64'
        run: |
          brew install --formula apr apr-util pcre2 openssl@3 libxml2 zlib \
            nghttp2 brotli lua curl jansson pkg-config

      - name: Build Apache from source (Linux/macOS)
        if: matrix.target != 'windows-x64'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          curl -fsSL -o httpd-src.tar.gz "https://archive.apache.org/dist/httpd/httpd-${VER}.tar.gz"
          # ── Supply-chain verification: archive.apache.org publishes a
          # .sha256 sidecar next to each tarball ("<hash> *<filename>").
          # Abort the build if the hash can't be fetched or doesn't match.
          # TODO(SECURITY.md roadmap): additionally verify the detached PGP
          # .asc signature once the ASF release-manager KEYS file is
          # bootstrapped into CI.
          curl -fsSL "https://archive.apache.org/dist/httpd/httpd-${VER}.tar.gz.sha256" -o httpd-src.tar.gz.sha256
          expected=$(awk '{print tolower($1); exit}' httpd-src.tar.gz.sha256)
          actual=$(sha256sum httpd-src.tar.gz | awk '{print $1}')
          if [ -z "$expected" ] || [ "$expected" != "$actual" ]; then
            echo "::error::SHA256 mismatch for httpd-${VER}.tar.gz — expected '$expected', got '$actual'" >&2
            exit 1
          fi
          echo "✓ SHA256 verified (httpd-${VER}.tar.gz): $actual"
          tar xf httpd-src.tar.gz
          cd httpd-${VER}
          PREFIX="${{ github.workspace }}/install/httpd-${VER}"
          if [ "${{ matrix.target }}" = "macos-arm64" ]; then
            APR_FLAGS="--with-apr=$(brew --prefix apr) --with-apr-util=$(brew --prefix apr-util)"
            SSL_FLAGS="--with-ssl=$(brew --prefix openssl@3)"
            PCRE_FLAGS="--with-pcre=$(brew --prefix pcre2)/bin/pcre2-config"
            EXTRA_FLAGS="--with-z=$(brew --prefix zlib) --with-libxml2=$(brew --prefix libxml2)"
          else
            # On Ubuntu the apt libapr1-dev / libaprutil1-dev install to /usr.
            # --with-included-apr would need apr/apr-util sources unpacked into
            # ./srclib/ which we'd have to download separately; system pkgs work fine.
            APR_FLAGS="--with-apr=/usr --with-apr-util=/usr"
            SSL_FLAGS="--with-ssl"
            PCRE_FLAGS="--with-pcre=/usr/bin/pcre2-config"
            EXTRA_FLAGS=""
          fi
          if [ "${{ matrix.target }}" = "macos-arm64" ]; then
            HTTP2_FLAGS="--enable-http2 --with-nghttp2=$(brew --prefix nghttp2)"
            BROTLI_FLAGS="--enable-brotli --with-brotli=$(brew --prefix brotli)"
            # mod_md needs jansson via pkg-config; brew's jansson installs to
            # /opt/homebrew but Apache configure doesn't auto-pick that path.
            MD_FLAGS="--with-jansson=$(brew --prefix jansson)"
            export PKG_CONFIG_PATH="$(brew --prefix jansson)/lib/pkgconfig:$(brew --prefix nghttp2)/lib/pkgconfig:$PKG_CONFIG_PATH"
          else
            HTTP2_FLAGS="--enable-http2"
            BROTLI_FLAGS="--enable-brotli"
            MD_FLAGS=""
          fi
          # Module selection rationale:
          #   --enable-mods-shared=most ships virtually every production module
          #   (auth*, proxy*, ssl, rewrite, headers, deflate, cache*, dav*, md,
          #   session*, socache_shmcb, lua, http2, brotli, vhost_alias, etc.)
          #   but EXCLUDES demo/test modules that "reallyall" would pull in:
          #     mod_example_hooks, mod_bucketeer, mod_case_filter,
          #     mod_case_filter_in, mod_echo, mod_dialup,
          #     mod_optional_hook_export, mod_optional_hook_import,
          #     mod_optional_fn_export, mod_optional_fn_import,
          #     mod_firehose, mod_auth_form, mod_cache_socache
          #   None of these are referenced by WDC vhost templates or common
          #   LAMP/FPM site configs; shipping them is pure bloat + attack
          #   surface (users can't disable-at-install on a precompiled tree).
          # Explicit flags below are belt-and-suspenders for modules that are
          # load-bearing for WDC's PHP-FPM proxy path, SSL, and MPM selection
          # — "most" already enables these but we pin them so a future
          # upstream rename of the "most" preset can't silently drop them.
          ./configure --prefix="$PREFIX" \
            --enable-so --enable-ssl --enable-rewrite --enable-proxy \
            --enable-proxy-fcgi --enable-proxy-http --enable-proxy-balancer \
            --enable-proxy-wstunnel --enable-proxy-connect \
            --enable-headers --enable-deflate \
            --enable-expires --enable-mime-magic --enable-vhost-alias \
            --enable-cgi --enable-cgid --enable-info --enable-status \
            --enable-md --enable-remoteip \
            --enable-session --enable-session-cookie --enable-session-crypto \
            --enable-macro --enable-ratelimit --enable-substitute \
            --enable-unique-id --enable-log-forensic --enable-dumpio \
            --enable-dav --enable-dav-fs --enable-dav-lock \
            --enable-cache --enable-cache-disk \
            --enable-socache-shmcb --enable-socache-memcache --enable-socache-redis \
            --enable-lua --enable-watchdog --enable-buffer --enable-reqtimeout \
            --enable-authn-socache --enable-authnz-fcgi \
            --enable-mods-shared=most \
            --enable-mpms-shared=event \
            --with-mpm=event \
            $HTTP2_FLAGS $BROTLI_FLAGS $MD_FLAGS \
            $APR_FLAGS $SSL_FLAGS $PCRE_FLAGS $EXTRA_FLAGS
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) 2>&1 | tail -10
          make install
          ls "$PREFIX/bin/" "$PREFIX/modules/" | head -10

      # Linux produces a dynamically linked httpd + modules/*.so that pull in
      # libapr-1.so.0, libaprutil-1.so.0, libssl.so.3, libcrypto.so.3, libpcre2,
      # libxml2 etc. from the CI runner's /usr/lib. A user on Debian/Alpine/Arch
      # /RHEL/Fedora hits `libapr-1.so.0: cannot open shared object file` or ABI
      # mismatches. Bundle the non-system deps under lib/ and rewrite RPATH to
      # $ORIGIN/../lib so the tarball is self-contained within any distro that
      # ships a compatible glibc (ubuntu-24.04 glibc is the ABI floor).
      # Mirrors the macOS dylib bundling pattern from PR #18.
      - name: Linux — bundle runtime .so deps + rewrite RPATH
        if: matrix.target == 'linux-x64'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          STAGE="${{ github.workspace }}/install/httpd-${VER}"
          command -v patchelf >/dev/null 2>&1 || sudo apt-get install -y -q patchelf
          mkdir -p "$STAGE/lib"
          echo "── ldd BEFORE ──"
          ldd "$STAGE/bin/httpd"
          # Collect non-system .so deps referenced by httpd + every module *.so.
          # Skip the libc family and ld-linux — bundling those invites ABI hell
          # across glibc versions; we require the target distro glibc >= ubuntu-24.04.
          collect_deps() {
            local bin="$1"
            ldd "$bin" 2>/dev/null | awk '/=> \// {print $3}' | \
              grep -Ev '/(ld-linux|libc|libm|libdl|libpthread|librt|libresolv|libutil|libnsl)[-.]' || true
          }
          {
            collect_deps "$STAGE/bin/httpd"
            for so in "$STAGE/modules/"*.so; do
              [ -f "$so" ] && collect_deps "$so"
            done
          } | sort -u | while read -r dep; do
            [ -n "$dep" ] && cp -Lv "$dep" "$STAGE/lib/"
          done
          ls -l "$STAGE/lib/" || true
          # Rewrite RPATH on httpd (lib/ is sibling to bin/) and on each module
          # (modules/ is also sibling to lib/).
          patchelf --set-rpath '$ORIGIN/../lib' "$STAGE/bin/httpd"
          for so in "$STAGE/modules/"*.so; do
            [ -f "$so" ] && patchelf --set-rpath '$ORIGIN/../lib' "$so"
          done
          # Also rewrite RPATH on the bundled libs themselves so inter-lib
          # references (libssl → libcrypto, libaprutil → libapr) resolve via
          # the bundled copies rather than the system ones.
          for so in "$STAGE/lib/"*.so*; do
            [ -f "$so" ] && [ ! -L "$so" ] && patchelf --set-rpath '$ORIGIN' "$so" || true
          done
          echo "── ldd AFTER ──"
          ldd "$STAGE/bin/httpd"
          # Verify no /lib/ or /usr/lib/ abs refs to the third-party libs remain
          # on the main binary. libc family is allowed through.
          if ldd "$STAGE/bin/httpd" | grep -qE '=> /(lib|usr/lib)/.*/(libapr|libssl|libcrypto|libpcre|libxml|libz\.|libnghttp2|libbrotli|liblua|libcurl|libjansson)'; then
            echo "::error::httpd still has system-abs deps to bundled libs after RPATH rewrite"
            exit 1
          fi

      - name: Package — Linux/macOS tar.xz
        if: matrix.target != 'windows-x64'
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          STAGE="${{ github.workspace }}/install/httpd-${VER}"
          cd "$STAGE"
          # Apache install layout doesn't include sbin or lib by default — bin/ holds
          # both httpd and helper tools, modules/ holds the .so MPM/extensions, conf/
          # holds httpd.conf + extra/. Skip sbin/lib since they're empty/missing.
          ls -d */ 2>&1 | head

          # Trim bloat + state-leak risk before tarring (HIGH-A3):
          #   manual/  — ~4 MB of HTML docs; WDC consumers don't need them.
          #   logs/    — FHS runtime dir; daemon mkdir's at startup. Shipping a
          #              pre-created logs/ risks leaking any access_log written
          #              by broken CI tests. Scrub files first, then drop dir.
          #   cgi-bin/ — empty default; daemon recreates if ever needed.
          #   icons/   — stock Apache directory-listing icons, not referenced
          #              by WDC-generated vhosts.
          # Kept: bin (daemon), conf (default templates), modules (.so),
          #       htdocs (fallback welcome page for bin/httpd first-start).
          if [ -d "$STAGE/logs" ]; then
            find "$STAGE/logs" -type f -delete
          fi
          rm -rf "$STAGE/manual" "$STAGE/logs" "$STAGE/cgi-bin" "$STAGE/icons"

          # Deterministic tar: GNU tar on Linux, gtar on macOS (BSD tar lacks
          # --sort / --pax-option). SOURCE_DATE_EPOCH pins mtime across reruns.
          if [ "${{ matrix.target }}" = "macos-arm64" ]; then
            brew install --quiet gnu-tar >/dev/null
            TAR=gtar
          else
            TAR=tar
          fi
          "$TAR" --sort=name --owner=0 --group=0 --numeric-owner \
            --mtime="@${SOURCE_DATE_EPOCH}" \
            --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
            -cJf "${{ github.workspace }}/httpd-${VER}-${{ matrix.target }}.tar.xz" \
            bin include modules conf $(ls -d build error htdocs man 2>/dev/null) \
            $(test -d sbin && echo sbin) $(test -d lib && echo lib)
          # The Linux bundling step above creates lib/; the test -d lib above
          # already picks it up. Retained for clarity.
          ls -lh "${{ github.workspace }}/httpd-${VER}-${{ matrix.target }}.tar.xz"
          # Top-level contents visibility — future broken-test state leaks
          # (rogue files dropped into $STAGE) will show up in CI logs here.
          tar -tf "${{ github.workspace }}/httpd-${VER}-${{ matrix.target }}.tar.xz" | head -30

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: binaries-apache-${{ steps.ver.outputs.version }}
          name: Apache HTTPD ${{ steps.ver.outputs.version }} (cross-platform binaries)
          body: |
            Self-contained Apache HTTPD ${{ steps.ver.outputs.version }} binaries for
            NKS WebDev Console's `wdc binaries install apache@${{ steps.ver.outputs.version }}` flow.
            Each archive expands to `bin/httpd`, `modules/*.so` and supporting files.
          fail_on_unmatched_files: true
          files: httpd-${{ steps.ver.outputs.version }}-${{ matrix.target }}.${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
